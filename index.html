function renderMatrix(){
  const cols=NODE_DEFS;
  $('#matrixTable').innerHTML=`<thead><tr><th style="width:24px"></th><th>分類</th>${cols.map(c=>`<th style="text-align:center">${c.label}</th>`).join('')}<th></th></tr></thead><tbody>`+
    S.categories.map((cat,i)=>`<tr data-i="${i}" ondragover="catDragOver(event,${i})" ondragleave="catDragLeave(${i})" ondrop="catDrop(event,${i})">
      <td class="dh"><span class="draghandle" draggable="true" ondragstart="catDragStart(event,${i})" ondragend="catDragEnd()" title="拖曳調整順序">⠿</span></td>
      <td><input value="${esc(cat.name)}" oninput="editCatName(${i},this.value)" style="width:140px;font-weight:600"></td>
      ${cols.map(col=>`<td class="cell" onclick="toggleCatCell(${i},'${col.key}')">${cat[col.key]?'<span class="check yes">V</span>':'<span class="check no">–</span>'}</td>`).join('')}
      <td><button class="iconbtn" onclick="delCat(${i})">✕</button></td></tr>`).join('')+`</tbody>`;
}
let dragCatFrom=null;
function catDragStart(e,i){dragCatFrom=i;e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',String(i));}catch(_){}}
function catDragOver(e,i){if(dragCatFrom===null)return;e.preventDefault();e.dataTransfer.dropEffect='move';const tr=$('#matrixTable').querySelector(`tr[data-i="${i}"]`);if(tr)tr.classList.add('dragover');}
function catDragLeave(i){const tr=$('#matrixTable').querySelector(`tr[data-i="${i}"]`);if(tr)tr.classList.remove('dragover');}
function catDragEnd(){dragCatFrom=null;document.querySelectorAll('#matrixTable tr.dragover').forEach(t=>t.classList.remove('dragover'));}
function catDrop(e,i){e.preventDefault();if(dragCatFrom===null||dragCatFrom===i){catDragEnd();return;}const arr=S.categories;const[m]=arr.splice(dragCatFrom,1);arr.splice(i,0,m);dragCatFrom=null;persist();renderMatrix();fillCatFilter();}
function editCatName(i,v){S.categories[i].name=v;persist();}
function toggleCatCell(i,k){S.categories[i][k]=!S.categories[i][k];persist();renderMatrix();}
function delCat(i){if(!confirm('刪除此分類？'))return;S.categories.splice(i,1);persist();renderMatrix();}
function addCat(){S.categories.push({name:'新分類',signin:true,cert:true,student:true,instr:true,invoice:true,payment:true});persist();renderMatrix();}

/* ===== tabs / settings modal / boot ===== */
/* ===== 差勤分頁：載入隔離 iframe + 加班偵測橋接 ===== */
const WORK_IN=10, WORK_OUT=19, OT_BUF=0.5;
const TW_CAL_P={'2025-2-28':1,'2025-4-3':1,'2025-4-4':1,'2025-4-5':1,'2025-5-1':1,'2025-5-29':1,'2025-5-30':1,'2025-5-31':1,'2025-6-1':2,'2025-9-27':1,'2025-10-2':1,'2025-10-4':2,'2025-10-6':1,'2025-10-10':1,'2026-1-1':1,'2026-2-14':1,'2026-2-15':1,'2026-2-16':1,'2026-2-17':1,'2026-2-18':1,'2026-2-19':1,'2026-2-20':1,'2026-2-21':1,'2026-2-22':1,'2026-2-27':1,'2026-2-28':1,'2026-3-1':1,'2026-4-3':1,'2026-4-4':1,'2026-4-5':1,'2026-4-6':1,'2026-5-1':1,'2026-5-2':1,'2026-5-3':1,'2026-6-19':1,'2026-6-20':1,'2026-6-21':1,'2026-9-25':1,'2026-9-26':1,'2026-9-27':1,'2026-9-28':1,'2026-10-9':1,'2026-10-10':1,'2026-10-11':1,'2026-10-24':1,'2026-10-25':1,'2026-10-26':1,'2026-12-25':1,'2026-12-26':1,'2026-12-27':1};
function isOffP(ds){const y=+ds.slice(0,4),m=+ds.slice(4,6)-1,d=+ds.slice(6,8);const v=TW_CAL_P[`${y}-${m+1}-${d}`]||0;if(v===2)return false;if(v===1)return true;const w=new Date(y,m,d).getDay();return w===0||w===6;}
function parseSlotP(t){t=String(t||'').replace(/\s/g,'');const m=t.match(/^(\d{3,4})-(\d{3,4})$/);if(!m)return null;const toH=s=>{s=s.padStart(4,'0');return (+s.slice(0,2))+(+s.slice(2,4))/60;};const a=toH(m[1]),b=toH(m[2]);if(!(b>a))return null;return [a,b];}
function courseSpanP(c){let lo=Infinity,hi=-Infinity;(c.sessions||[]).forEach(s=>{const r=parseSlotP(s.time);if(r){lo=Math.min(lo,r[0]);hi=Math.max(hi,r[1]);}});return lo===Infinity?null:[lo,hi];}
function otTimesP(c){
  const sp=courseSpanP(c);if(!sp)return null;
  const off=isOffP(c.date);
  const early=Math.max(0,Math.floor((sp[0]-OT_BUF)*2)/2);
  const late=Math.min(24,Math.ceil((sp[1]+OT_BUF)*2)/2);
  let inH=null,outH=null;
  if(off){inH=early;outH=late;}                     // 假日：上下班都填
  else{ if(early<WORK_IN)inH=early; if(late>WORK_OUT)outH=late; } // 平日：只填超出的那一側
  if(inH==null&&outH==null)return null;
  return {inH,outH,off};
}
function instrTypeP(name){const i=S.instructors.find(x=>x.name===name);return i?i.type:'外部';}
function internalPeopleP(c){const set=new Set([...(c.instructors||[]),...(c.assistants||[])]);return [...set].filter(n=>instrTypeP(n)==='內部');}
function fmtHsm(h){if(h==null)return '';const hh=Math.floor(h),mm=Math.round((h-hh)*60);return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function parseHMm(s){s=String(s||'').trim().replace(/\s/g,'');if(!s)return null;let h,m=0;if(s.includes(':')){const p=s.split(':');h=+p[0];m=+p[1]||0;}else if(/^\d{3,4}$/.test(s)){s=s.padStart(4,'0');h=+s.slice(0,2);m=+s.slice(2,4);}else{const f=parseFloat(s);if(isNaN(f))return null;h=Math.floor(f);m=Math.round((f-h)*60);}if(isNaN(h))return null;return Math.round((h+m/60)*2)/2;}

const otAcked=new Set();
let _otCtx=null;
function checkOvertime(courseId){
  const c=findCourse(courseId);if(!c)return;
  const t=otTimesP(c),people=internalPeopleP(c);
  if(!t||!people.length)return;
  const y=+c.date.slice(0,4),m=+c.date.slice(4,6)-1,dd=+c.date.slice(6,8);
  const fresh=people.filter(n=>!otAcked.has(`${courseId}|${c.date}|${n}|${t.inH}|${t.outH}`));
  if(!fresh.length)return;
  _otCtx={courseId,date:c.date,y,m,dd,t,people:fresh};
  const dlabel=`${y}/${m+1}/${dd}`;
  $('#otDesc').innerHTML=t.off
    ? `「${esc(c.name||'未命名課程')}」（${dlabel}）為假日，原本無須上班，將整段課程時間填入差勤表。時間可自行調整：`
    : `「${esc(c.name||'未命名課程')}」（${dlabel}）超出上班時間（${fmtHsm(WORK_IN)}–${fmtHsm(WORK_OUT)}），僅需補填超出的時段。可自行調整（留白＝不填、用預設）：`;
  $('#otList').innerHTML=fresh.map((n,i)=>`<div class="otrow">
      <input type="checkbox" data-i="${i}" checked>
      <span class="who">${esc(n)}</span>
      <span class="ottimes">
        <label>上班<input class="ti otin" data-i="${i}" value="${fmtHsm(t.inH)}" placeholder="${t.off?'':fmtHsm(WORK_IN)}"></label>
        <label>下班<input class="ti otout" data-i="${i}" value="${fmtHsm(t.outH)}" placeholder="${t.off?'':fmtHsm(WORK_OUT)}"></label>
      </span>
    </div>`).join('');
  $('#otScrim').classList.add('show');
}
function closeOt(){$('#otScrim').classList.remove('show');_otCtx=null;}
function ackOt(){if(!_otCtx)return;_otCtx.people.forEach(n=>otAcked.add(`${_otCtx.courseId}|${_otCtx.date}|${n}|${_otCtx.t.inH}|${_otCtx.t.outH}`));}
function otConfirm(){
  if(!_otCtx)return;
  const rows=[...$('#otList').querySelectorAll('.otrow')];
  let sent=0;
  rows.forEach(row=>{
    const cb=row.querySelector('input[type=checkbox]');if(!cb||!cb.checked)return;
    const i=+cb.dataset.i,name=_otCtx.people[i];
    const inH=parseHMm(row.querySelector('.otin').value);
    const outH=parseHMm(row.querySelector('.otout').value);
    if(inH==null&&outH==null)return;
    postAtt({name,y:_otCtx.y,m:_otCtx.m,dd:_otCtx.dd,inH,outH});sent++;
  });
  ackOt();closeOt();
  if(sent)toast(`已送出 ${sent} 筆加班到差勤表`);
}

/* iframe bridge */
let attReady=false;const attQueue=[];
function attFrameEl(){return document.getElementById('attframe');}
function loadAttFrame(){const f=attFrameEl();if(f&&!f.getAttribute('srcdoc')){f.setAttribute('srcdoc',document.getElementById('att-doc').textContent.replace(/<\\\/script>/g,'</'+'script>'));}}
function flushAtt(){const f=attFrameEl();if(!attReady||!f||!f.contentWindow)return;while(attQueue.length)f.contentWindow.postMessage(attQueue.shift(),'*');}
function postAtt(p){attQueue.push(Object.assign({type:'ATT_OT'},p));flushAtt();}
function postAttRaw(msg){attQueue.push(msg);flushAtt();}
window.addEventListener('message',e=>{const d=e.data||{};if(d.type==='ATT_READY'){attReady=true;flushAtt();postAttRaw({type:'ATT_GET_EMPS'});}else if(d.type==='ATT_EMPS'){attEmps=d.emps||[];renderAttEmpTable();}});

/* ===== 差勤員工管理（設定分頁，跨框架操作差勤資料） ===== */
let attEmps=[],attEmpEditId=null;
function attEmpRefresh(){postAttRaw({type:'ATT_GET_EMPS'});}
function renderAttEmpTable(){
  const t=$('#attEmpTable');if(!t)return;
  if(!attEmps.length){t.innerHTML='<tbody><tr><td style="padding:14px;color:var(--ink-2)">尚無員工，點「＋ 新增員工」建立。</td></tr></tbody>';return;}
  t.innerHTML='<thead><tr><th style="text-align:left">姓名</th><th>到職日</th><th>上課假上限</th><th>補休基數</th><th></th></tr></thead><tbody>'+
    attEmps.map(e=>`<tr><td style="text-align:left;font-weight:600">${esc(e.name)}</td><td>${esc(e.joinDate||'—')}</td><td>${e.classMax} 天</td><td>${e.compBal} 時</td><td style="white-space:nowrap"><button class="iconbtn" title="編輯" onclick="attEmpEdit(${e.id})">✎</button> <button class="iconbtn" title="刪除" onclick="attEmpDelete(${e.id})">✕</button></td></tr>`).join('')+'</tbody>';
}
function attEmpShowForm(emp){
  attEmpEditId=emp?emp.id:null;
  const f=$('#attEmpForm');f.style.display='block';
  f.innerHTML=`<div class="editgrid" style="margin:4px 0 10px">
      <div><label>姓名</label><input id="ae-name" value="${emp?esc(emp.name):''}" placeholder="員工姓名"></div>
      <div><label>到職日</label><input type="date" id="ae-join" value="${emp?esc(emp.joinDate||''):''}"></div>
      <div><label>每月上課假上限（天）</label><input type="number" id="ae-cm" min="0" value="${emp?emp.classMax:2}"></div>
      <div><label>補休餘額基數（時）</label><input type="number" step="0.5" id="ae-cb" value="${emp?emp.compBal:0}"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn ghost sm" onclick="attEmpCancel()">取消</button><button class="btn sm" onclick="attEmpSave()">儲存</button></div>`;
}
function attEmpAdd(){attEmpShowForm(null);}
function attEmpEdit(id){const e=attEmps.find(x=>x.id===id);if(e)attEmpShowForm(e);}
function attEmpCancel(){attEmpEditId=null;const f=$('#attEmpForm');f.style.display='none';f.innerHTML='';}
function attEmpSave(){
  const name=$('#ae-name').value.trim(),join=$('#ae-join').value;
  if(!name||!join){toast('請填寫姓名與到職日');return;}
  const emp={name,joinDate:join,classMax:+$('#ae-cm').value||0,compBal:parseFloat($('#ae-cb').value)||0};
  if(attEmpEditId!=null)emp.id=attEmpEditId;
  postAttRaw({type:'ATT_EMP_SAVE',emp});attEmpCancel();toast('已儲存員工');
}
function attEmpDelete(id){if(!confirm('確定刪除此員工？此操作會一併移除其差勤資料。'))return;postAttRaw({type:'ATT_EMP_DELETE',id});}


function switchTab(name){
  const panel=(name==='attsummary')?'attendance':name;
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+panel));
  if(name==='courses')document.querySelectorAll('.course.open').forEach(el=>el.classList.remove('open'));
  if(name==='salary')renderSalary();
  if(name==='attendance'){loadAttFrame();postAttRaw({type:'ATT_SHOW',page:'schedule'});}
  if(name==='attsummary'){loadAttFrame();postAttRaw({type:'ATT_SHOW',page:'summary'});}
}
function openSettings(){renderInstructors();renderMatrix();$('#lineEndpoint').value=(S.settings&&S.settings.lineEndpoint)||'';attEmpRefresh();$('#setScrim').classList.add('show');}
function bindUI(){
  $('#tabs').addEventListener('click',e=>{if(e.target.dataset.tab)switchTab(e.target.dataset.tab);});
  $('#fMonth').onchange=$('#fCat').onchange=renderCourses;$('#fSearch').oninput=renderCourses;
  $('#btnArchive').onclick=()=>setArchiveView(!archiveView);
  $('#sMonth').onchange=$('#sArch').onchange=renderSalary;
  $('#btnAdd').onclick=addCourse;
  $('#btnSettings').onclick=openSettings;$('#setClose').onclick=()=>$('#setScrim').classList.remove('show');
  $('#setScrim').onclick=e=>{if(e.target.id==='setScrim')$('#setScrim').classList.remove('show');};
  $('#otClose').onclick=closeOt;$('#otSkip').onclick=()=>{ackOt();closeOt();};$('#otFill').onclick=otConfirm;
  $('#otScrim').onclick=e=>{if(e.target.id==='otScrim')closeOt();};
  loadAttFrame();
  document.querySelectorAll('.settabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.settabs button').forEach(x=>x.classList.toggle('active',x===b));['instr','cat','line','emp'].forEach(s=>{const el=document.getElementById('set-'+s);if(el)el.style.display=(b.dataset.s===s)?'':'none';});if(b.dataset.s==='emp'){attEmpRefresh();renderAttEmpTable();}});
  $('#btnAttEmpAdd').onclick=attEmpAdd;
  $('#btnAddInstr').onclick=addInstr;$('#btnAddCat').onclick=addCat;
  $('#lineEndpoint').oninput=e=>{S.settings=S.settings||{};S.settings.lineEndpoint=e.target.value.trim();persist();};
  $('#btnExport').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));a.download='anne_course_'+new Date().toISOString().slice(0,10)+'.json';a.click();};
  $('#btnImport').onclick=()=>$('#importFile').click();
  $('#importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=JSON.parse(r.result);persist();afterLoad();toast('已匯入');}catch(err){toast('檔案格式錯誤');}};r.readAsText(f);};
  $('#btnReset').onclick=async()=>{if(!confirm('重設為範例資料？目前資料將被覆蓋。'))return;S=seedState();await DataStore.save(S);afterLoad();toast('已重設');};
}
function afterLoad(){fillMonthSelect($('#fMonth'),true);fillMonthSelect($('#sMonth'),false);fillCatFilter();renderCourses();}
const GEAR_NEW_URL='https://rent.anne.education/admin/order/new?type=internal';
const ICON_ARCH='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>';
const ICON_BACK='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
function setArchiveView(v){archiveView=v;$('#btnArchive').innerHTML=(v?ICON_BACK+'<span>返回課程總表</span>':ICON_ARCH+'<span>封存區</span>');$('#btnArchive').classList.toggle('primary',v);$('#btnAdd').style.display=v?'none':'';renderCourses();}
async function boot(){
  S=await DataStore.load();
  if(!S||!S.courses){S=seedState();await DataStore.save(S);}
  S.instructors=S.instructors||seedInstructors();S.categories=S.categories||seedCategories();
  S.courses=(S.courses||[]).map(c=>{
    c=Object.assign({progress:{},archived:false,lineSent:'',instructors:[],assistants:[],sessions:[{time:'',count:''}]},c);
    c.billing=Object.assign(newBilling(),c.billing||{});
    // 舊版 invoice → company 遷移
    if(c.billing.invoice!==undefined){c.billing.company=c.billing.company||c.billing.invoice;if(c.billing.invoiceAmount)c.billing.companyAmount=c.billing.companyAmount||c.billing.invoiceAmount;if(c.billing.invoicePay)c.billing.companyPay=Object.assign({},c.billing.invoicePay,c.billing.companyPay);delete c.billing.invoice;delete c.billing.invoiceAmount;delete c.billing.invoicePay;}
    return c;
  });
  S.settings=S.settings||{lineEndpoint:''};
  normalizeCourses(S);
  bindUI();afterLoad();
}
const PW='saveanne';
function unlock(){$('#gate').style.display='none';$('#app').style.display='block';boot();}
$('#pwBtn').onclick=()=>{if($('#pw').value===PW)unlock();else $('#pwErr').textContent='密碼錯誤';};
$('#pw').addEventListener('keydown',e=>{if(e.key==='Enter')$('#pwBtn').click();});
window.addEventListener('load',()=>$('#pw').focus());
</script>
