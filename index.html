<style>
  :root{
    --red:#37668A;--red-dark:#2A506E;--red-soft:#E9F0F5;--danger:#C0392B;
    --ink:#1B2430;--ink-2:#5A6573;--line:#E6E9EE;--line-2:#EEF1F5;
    --bg:#F4F6F9;--card:#FFFFFF;--good:#1E9E6A;--good-soft:#E6F5EE;--good-dk:#157a52;--warn:#C9821B;
    --shadow:0 1px 2px rgba(27,36,48,.06),0 6px 18px rgba(27,36,48,.05);--radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{overflow-y:scroll;scrollbar-gutter:stable}
  body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;font-size:15px;font-weight:500;line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
  h1,h2,h3{margin:0}a{color:var(--red)}

  /* login */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#1B2430,#2A3647);display:flex;align-items:center;justify-content:center;z-index:100}
  #gate .box{background:#fff;border-radius:18px;padding:34px 30px;width:330px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
  #gate .ecg{height:34px;margin-bottom:14px}
  #gate .gate-logo{height:42px;margin:0 auto 16px;display:block}
  #gate h2{font-size:19px;letter-spacing:.5px}
  #gate p{color:var(--ink-2);font-size:13px;margin:6px 0 18px}
  #gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;text-align:center;letter-spacing:2px}
  #gate button{width:100%;padding:12px;border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:600;font-size:15px}
  #gate .err{color:var(--danger);font-size:13px;height:18px;margin-top:6px}

  /* shell */
  header.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .top-inner{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{width:40px;height:40px;border-radius:11px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
  .brand-logo{height:34px;display:block}
  .brand-txt h1{font-size:18px;font-weight:700;line-height:1.1}
  .brand h1{font-size:18px;font-weight:700}
  .brand small{display:block;color:var(--ink-2);font-size:11px;font-weight:500;letter-spacing:.4px}
  .ecg-strip{flex:1;height:30px;opacity:.8;min-width:50px}
  .top-actions{display:flex;gap:8px}
  .top-actions button{background:transparent;border:1px solid var(--line);color:var(--ink-2);border-radius:9px;padding:7px 11px;font-size:13px}
  .top-actions button:hover{border-color:var(--red);color:var(--red)}
  .top-actions .primary{border-color:var(--red);color:var(--red);font-weight:600}

  nav.tabs{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto}
  nav.tabs button{background:transparent;border:0;border-bottom:2px solid transparent;padding:13px 14px;font-size:14px;font-weight:600;color:var(--ink-2);white-space:nowrap}
  nav.tabs button.active{color:var(--red);border-bottom-color:var(--red)}
  main{max-width:1180px;margin:0 auto;padding:20px}
  .panel{display:none}.panel.active{display:block}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:16px}
  .toolbar .grow{flex:1;min-width:120px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:11px;color:var(--ink-2);font-weight:600}
  .ctl{padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .btn{border:0;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px;background:var(--red);color:#fff}
  .btn:hover{background:var(--red-dark)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--red);color:var(--red)}
  .btn.sm{padding:6px 10px;font-size:13px}
  .toggle{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2);user-select:none;cursor:pointer;padding:8px 0}
  .toggle input{width:16px;height:16px;accent-color:var(--red)}

  /* course rows */
  .course{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
  .course.arch{opacity:.62}
  .course.thisweek{background:#F1F7FC;border-color:#CFE0EE}
  .course.thisweek .crow:hover{background:#EAF2FA}
  .course.warn-remind{border-left:4px solid var(--danger)}
  .course.warn-incomplete{border-left:4px solid var(--warn)}
  .cmid{min-width:0}
  .crow{display:grid;grid-template-columns:38px 58px 1fr auto;gap:10px;padding:13px 16px;cursor:pointer;align-items:start}
  .crow:hover{background:#FCFCFD}
  .cserial{font-size:12px;font-weight:600;color:var(--ink-2);text-align:center;line-height:1.2;padding-top:6px}
  .cserial small{display:block;color:#9aa3af;font-weight:500;font-size:10px}
  .cdate{font-weight:800;font-size:20px;line-height:1.15}.cdate small{display:block;color:var(--ink-2);font-weight:600;font-size:12px;margin-top:1px}
  .cmid .cname{font-weight:700;font-size:18px}
  .cmeta{color:var(--ink-2);font-size:15px;margin-top:4px;display:flex;flex-wrap:wrap;gap:3px 12px;overflow-wrap:anywhere}
  .crow-nodes{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .cright{display:flex;align-items:center;gap:8px;padding-top:2px}
  .cright{display:flex;flex-direction:column;align-items:flex-end;gap:8px;align-self:stretch}
  .cright .top{display:flex;align-items:center;gap:8px}
  .cright .spacer{flex:1}
  .linebtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;color:var(--ink-2);border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:600}
  .cright-actions{display:flex;align-items:center;gap:6px}
  .linkbtn{border:1px solid var(--line);background:#fff;color:#37668A;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer}
  .linkbtn:hover{background:#EEF3F8;border-color:#37668A}
  .linkbtn.addgear{color:#1B7A4B;border-style:dashed}
  .linkbtn.addgear:hover{background:#EAF5EE;border-color:#1B7A4B}
  .link-hint{font-size:11px;color:var(--ink-2);margin-top:5px}
  .link-hint a{color:#1B7A4B;font-weight:600;text-decoration:none}
  .link-hint a:hover{text-decoration:underline}
  .linkgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .linebtn:hover{border-color:#06C755;color:#06C755}
  .linebtn.sent{border-color:#06C755;color:#06C755;background:#EBFAF0}
  .archhead{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--warn);background:#FFF7EC;border:1px solid #F3E2C2;border-radius:10px;padding:10px 14px;margin-bottom:12px}
  .chev{color:var(--ink-2);transition:transform .18s;font-size:13px}
  .course.open .chev{transform:rotate(90deg)}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--line-2);color:var(--ink-2)}
  .pill.company{background:var(--good-soft);color:var(--good)}
  .pill.assoc{background:#EAF3FF;color:#2563B5}
  .pill.labor{background:#EEF0FF;color:#4350B5}
  .pill.arch{background:#FFF3E0;color:var(--warn)}

  .node{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:30px;padding:4px 10px;font-size:12px;background:#fff;cursor:pointer;user-select:none;color:var(--ink-2)}
  .node .dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
  .node.done{border-color:var(--good);background:var(--good-soft);color:var(--good-dk)}
  .node.done .dot{background:var(--good);border-color:var(--good)}
  .node.off{opacity:.45;border-style:dashed;background:#FAFBFC;cursor:default;color:var(--ink-2)}
  .node.off .dot{background:#fff;border-color:var(--line)}
  .ml{color:#9aa3af;font-weight:700;font-size:13px;margin-right:3px}
  .nodetoggles{display:flex;flex-wrap:wrap;gap:8px 18px}
  .ntog{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--ink);cursor:pointer}
  .ntog input{width:16px;height:16px;accent-color:var(--red)}

  .cbody{display:none;border-top:1px dashed var(--line);padding:16px;background:#FBFCFE}
  .course.open .cbody{display:block}
  .sec{margin-bottom:18px}.sec:last-child{margin-bottom:0}
  .secrow{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}.secrow .sec{margin-bottom:0}
  .sec h4{font-size:12px;letter-spacing:.6px;color:var(--ink-2);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .sec h4::before{content:"";width:3px;height:13px;background:var(--red);border-radius:2px}

  .editgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .editgrid .full{grid-column:1/-1}
  .editgrid label,.linkgrid label{font-size:11px;color:var(--ink-2);font-weight:600;display:block;margin-bottom:4px}
  .editgrid input,.editgrid select,.editgrid textarea,.linkgrid input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .editgrid textarea{min-height:54px;resize:vertical}

  /* tag input */
  .taginput{display:flex;flex-wrap:wrap;gap:5px;align-items:center;border:1px solid var(--line);border-radius:9px;padding:5px 6px;background:#fff;position:relative}
  .taginput .chip{display:inline-flex;align-items:center;gap:5px;background:var(--red-soft);color:var(--red);border-radius:7px;padding:3px 6px 3px 9px;font-size:13px;font-weight:600}
  .taginput .chip i{cursor:pointer;font-style:normal;color:var(--red);opacity:.7;font-size:13px}
  .taginput .chip i:hover{opacity:1}
  .taginput .tag-entry{border:0;outline:none;flex:1;min-width:80px;padding:5px 4px;font-size:14px}
  .tag-suggest{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 28px rgba(27,36,48,.14);z-index:20;margin-top:4px;overflow:hidden}
  .sg-item{padding:8px 11px;cursor:pointer;font-size:13.5px}
  .sg-item:hover{background:var(--red-soft)}

  table.grid{width:100%;border-collapse:collapse;font-size:13.5px}
  table.grid th,table.grid td{padding:7px 9px;border-bottom:1px solid var(--line-2);text-align:left;vertical-align:middle}
  table.grid th{font-size:11px;color:var(--ink-2);font-weight:700;text-transform:uppercase}
  table.grid input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px}
  table.grid input.num{text-align:right}

  .billbox{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px}
  .billtop{display:flex;flex-wrap:wrap;gap:18px;align-items:center}
  .moneyin{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .moneyin span{color:var(--ink-2);font-size:13px}
  .moneyin input{width:150px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;text-align:right}
  .subbill{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .subbill h5{margin:0 0 8px;font-size:12.5px;font-weight:700}
  .total-row{margin-top:8px;text-align:right;font-size:14px;font-weight:700}
  .total-row b{color:var(--red);font-size:16px;margin-left:6px}
  .empty-hint{color:var(--ink-2);font-size:13px;padding:6px 2px}
  .cactions{display:flex;flex-wrap:wrap;gap:8px}

  /* generic table cards */
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:4px;overflow-x:auto}
  table.full{width:100%;border-collapse:collapse;font-size:14px}
  table.full th,table.full td{padding:10px 12px;border-bottom:1px solid var(--line-2);text-align:left;white-space:nowrap}
  table.full thead th{background:#fff;font-size:11.5px;color:var(--ink-2);text-transform:uppercase}
  table.full input,table.full select{padding:6px 8px;border:1px solid var(--line);border-radius:7px}
  th.r,td.r{text-align:right}
  .typebadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .typebadge.in{background:var(--red-soft);color:var(--red)}
  .typebadge.out{background:#EEF0FF;color:#4350B5}
  .check{display:inline-block;width:22px;text-align:center;font-weight:700}
  .check.yes{color:var(--good)}.check.no{color:var(--line)}
  .matrix td.cell{text-align:center;cursor:pointer;user-select:none}
  .matrix td.cell:hover{background:var(--line-2)}
  .draghandle{cursor:grab;color:#b6bdc7;font-size:16px;user-select:none;display:inline-block;width:18px;text-align:center}
  .draghandle:active{cursor:grabbing}
  .matrix tr.dragover td{box-shadow:inset 0 2px 0 var(--red)}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:8px;width:30px;height:30px;color:var(--ink-2);font-size:14px;line-height:1}
  .iconbtn:hover{border-color:var(--red);color:var(--red)}

  /* salary */
  .salary-summary{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
  .stat{flex:1;min-width:170px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .lab{font-size:12px;color:var(--ink-2);font-weight:600}
  .stat .val{font-size:23px;font-weight:800;margin-top:4px}
  .stat.green .val{color:var(--good)}.stat.blue .val{color:#2563B5}.stat.red .val{color:var(--danger)}
  .money.pos{color:var(--good);font-weight:700}.money.neg{color:var(--danger);font-weight:700}
  .sblock{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
  .sblock h3{font-size:14px;padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .sblock h3::before{content:"";width:4px;height:15px;border-radius:2px;background:var(--red)}
  .sblock.assoc h3::before{background:#2563B5}.sblock.labor h3::before{background:#4350B5}
  table.sal{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed}
  table.sal th.r,table.sal td.r{width:116px}
  table.sal td.det{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  table.sal th{font-size:11px;color:var(--ink-2);text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1px solid var(--line-2)}
  table.sal th.r{text-align:right}
  table.sal td{padding:9px 14px;border-bottom:1px solid var(--line-2)}
  table.sal tfoot td{font-weight:700;border-top:1px solid var(--line);border-bottom:0;background:#FBFCFE}
  .srow{cursor:pointer}.srow:hover{background:#FCFCFD}
  .chev2{display:inline-block;color:var(--ink-2);font-size:11px;transition:transform .15s;width:12px}
  .chev2.open{transform:rotate(90deg)}
  .subtab{width:100%;border-collapse:collapse;font-size:13px;background:#FBFCFE;border-radius:8px;overflow:hidden;margin:2px 0}
  .subtab th{font-size:10.5px;color:var(--ink-2);padding:6px 12px;text-transform:uppercase}
  .subtab td{padding:6px 12px;border-bottom:1px solid var(--line-2)}
  .subwrap td{padding:4px 14px 10px 30px;background:#FBFCFE}
  .detrow td{background:#FBFCFE;font-size:13px}
  .detrow .det{padding-left:34px;color:var(--ink-2)}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(27,36,48,.45);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:30px 16px;overflow:auto}
  .scrim.show{display:flex}
  #attframe{display:block;width:100%;height:calc(100vh - 150px);min-height:520px;border:0;background:transparent}
  .otlist{display:flex;flex-direction:column;gap:8px;margin:6px 0 4px}
  .otrow{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px}
  .otrow input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}
  .otrow .who{font-weight:700}
  .otrow .ottimes{margin-left:auto;display:flex;gap:10px}
  .otrow .ottimes label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-2)}
  .otrow .ottimes .ti{width:62px;padding:5px 6px;border:1px solid var(--line);border-radius:7px;text-align:center;font-size:13px}
  .modal{background:#fff;border-radius:16px;width:820px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.3)}
  .modal header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal header h3{font-size:16px}
  .modal .mbody{padding:18px 20px}
  .settabs{display:flex;gap:6px;margin-bottom:14px}
  .settabs button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:13.5px;font-weight:600;color:var(--ink-2)}
  .settabs button.active{border-color:var(--red);color:var(--red);background:var(--red-soft)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:13.5px;opacity:0;transition:.25s;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .muted{color:var(--ink-2)}
  .hint{font-size:14px;color:var(--ink-2);margin:-6px 0 14px}

  @media(max-width:680px){
    .crow{grid-template-columns:36px 54px 1fr auto;gap:8px}
    .editgrid{grid-template-columns:1fr}
    .secrow{grid-template-columns:1fr}
    .ecg-strip{display:none}
    .modal{width:100%}
  }
</style>
</head>

        <button class="btn ghost" id="btnArchive" style="display:inline-flex;align-items:center;gap:6px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg><span>封存區</span></button>
        <button class="btn" id="btnAdd">＋ 新增課程</button>
      </div>
      <div id="courseList"></div>
    </section>

    <section class="panel" id="panel-salary">
      <div class="toolbar">
        <div class="field"><label>月份</label><select id="sMonth" class="ctl"></select></div>
        <label class="toggle"><input type="checkbox" id="sArch" checked>含封存課程</label>
        <div class="grow"></div>
        <button class="btn sm" id="btnSalaryLine" onclick="sendSalaryNotice()" title="將所選月份的薪資明細，分別以 LINE 傳給各外部講師">LINE 通知外部講師</button>
      </div>
      <div class="salary-summary" id="salarySummary"></div>
      <div id="salaryBlocks"></div>
    </section>

    <section class="panel" id="panel-attendance">
      <iframe id="attframe" title="差勤管理"></iframe>
    </section>
  </main>
</div>

<!-- settings -->
<div class="scrim" id="setScrim">
  <div class="modal">
    <header><h3>設定</h3><button class="iconbtn" id="setClose">✕</button></header>
    <div class="mbody">
      <div class="settabs"><button data-s="instr" class="active">指導員名單</button><button data-s="cat">課程分類及對應方塊</button><button data-s="line">通知設定</button><button data-s="emp">差勤員工</button></div>

        <div class="toolbar"><div class="grow"></div><button class="btn sm" id="btnAddInstr">＋ 新增指導員</button></div>
        <div class="card"><table class="full" id="instrTable"></table></div>
      </div>
      <div id="set-cat" style="display:none">
        <div class="toolbar"><div class="grow"></div><button class="btn sm" id="btnAddCat">＋ 新增分類</button></div>
        <div class="card"><table class="full matrix" id="matrixTable"></table></div>
      </div>
      <div id="set-line" style="display:none">
        <p class="hint">前端無法直接呼叫 LINE API（會被 CORS 擋，且金鑰不能放前端）。請把附的 Apps Script 部署成 Web App，將 <b>/exec</b> 網址貼在下方；按「LINE 通知」時就會把課程內容送到這個端點推播。</p>
        <div class="field"><label>LINE 發送端點（Apps Script Web App /exec 網址）</label><input id="lineEndpoint" class="ctl" style="width:100%" placeholder="https://script.google.com/macros/s/XXXX/exec"></div>
        <p class="hint" style="margin-top:12px">收件對象＝該課程講師＋助教中、在指導員名單裡有填 LINE userId 的人（自動去重，無 userId 者略過）。訊息格式與你原本的課前通知一致。</p>
      </div>
      <div id="set-emp" style="display:none">
        <div class="toolbar"><div class="grow"></div><button class="btn sm" id="btnAttEmpAdd">＋ 新增員工</button></div>
        <div id="attEmpForm" style="display:none"></div>
        <div class="card"><table class="full" id="attEmpTable"></table></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json" style="display:none">
<div class="toast" id="toast"></div>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>差勤管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f3f3f1;color:#1a1a1a;font-size:14px}
.app{max-width:1800px;margin:0 auto;padding:20px 16px}
h1{font-size:20px;font-weight:600;margin-bottom:18px}
.tabs{display:flex;margin-bottom:18px;border-bottom:1.5px solid #ddd}
.tb{padding:9px 22px;font-size:14px;border:none;background:transparent;cursor:pointer;color:#888;border-bottom:2.5px solid transparent;margin-bottom:-1.5px}
.tb.on{color:#111;border-bottom-color:#111;font-weight:500}
.tb:hover:not(.on){color:#333}
.pg{display:none}.pg.on{display:block}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.topbar label{font-size:13px;color:#666}
select{font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;height:32px;cursor:pointer}
input[type=text],input[type=date],input[type=number]{font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;height:32px}
.bsm{font-size:13px;padding:5px 14px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;cursor:pointer;height:32px}
.bsm:hover{background:#ebebea}
.legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.leg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.sw{overflow-x:auto;border:1px solid #e0e0de;border-radius:10px;background:#fff}
.st{border-collapse:collapse;font-size:11px;table-layout:fixed}
.st th{background:#f6f6f4;padding:4px 2px;font-size:10px;font-weight:500;color:#555;text-align:center;border-bottom:1px solid #e4e4e2;border-right:1px solid #e4e4e2;white-space:nowrap;line-height:1.4;overflow:hidden}
.st th.nc{text-align:center;padding:4px;position:sticky;left:0;z-index:3;background:#f6f6f4}
.st th.mc{text-align:left;padding-left:8px}
.st td{padding:2px 2px;border-bottom:1px solid #e4e4e2;border-right:1px solid #e4e4e2;vertical-align:top;overflow:hidden}
.st td.ncc{text-align:center;padding:6px 6px;font-weight:500;font-size:13px;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:2;vertical-align:middle}
.st td.mcc{padding:4px 8px;vertical-align:middle}
.st tr:last-child td{border-bottom:none}
.st td:last-child,.st th:last-child{border-right:none}
.dc{display:flex;flex-direction:column;align-items:stretch;gap:2px;padding:3px 3px;width:100%;overflow:hidden}
.lv-sel{font-size:10px;width:100%;height:21px;padding:0 2px;border-radius:3px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#111;min-width:0}
.lv-sel:focus{outline:1px solid #4a90d9}
.time-stack{display:flex;flex-direction:column;gap:2px;width:100%}
.time-field{display:flex;align-items:center;gap:2px;width:100%}
.time-lbl{font-size:9px;color:#bbb;width:11px;flex-shrink:0;text-align:right;line-height:1}
.ti{font-size:10px;flex:1;min-width:0;width:0;height:20px;padding:0 2px;border-radius:2px;border:1px solid #ddd;text-align:center;background:#fff;color:#111}
.ti:focus{outline:1px solid #4a90d9;border-color:#4a90d9}
.ti.has-val{border-color:#999;background:#f7f7f5;font-weight:600}
.comp-tag{font-size:9px;font-weight:600;border-radius:2px;padding:1px 3px;line-height:1.4;white-space:nowrap;text-align:center;margin-top:1px}
.cp{background:#e2f5e8;color:#1a6a35}
.cn{background:#fde8e8;color:#8a1a1a}
.cz{background:#f0f0ee;color:#777}
.offday{background:#ffeae0}
.tdy{background:#ddeeff!important}
.bx{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500;white-space:nowrap;margin:1px 1px}
.b特休{background:#ddeeff;color:#1a5a9a}
.b病假{background:#fef0da;color:#7a4a0a}
.b事假{background:#eeecff;color:#4a3899}
.b補休{background:#e8f5e2;color:#2a5e15}
.b上課假{background:#fde8f2;color:#7a2060}
.tw{border:1px solid #e0e0de;border-radius:10px;overflow:hidden;overflow-x:auto;background:#fff}
.dt{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;table-layout:fixed}
.dt th{background:#f6f6f4;padding:9px 6px;font-size:11px;font-weight:500;color:#888;text-align:center;border-bottom:1px solid #e4e4e2}
.dt th.sec-head{background:#eeeef0;color:#555;font-size:11px;font-weight:600;letter-spacing:.3px;border-top:2px solid #d0d0d4}
.dt td{padding:9px 6px;border-bottom:1px solid #e4e4e2;color:#111;text-align:center;overflow:hidden;text-overflow:ellipsis}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#f9f9f7}
.dt .sec-div{border-right:2px solid #d8d8dc}
.rok{color:#1a7a50;font-weight:600}.rlo{color:#b87010;font-weight:600}.rno{color:#b82020;font-weight:600}
.cpos{color:#1a6a35;font-weight:600}.cneg{color:#b82020;font-weight:600}
.anno-box{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.anno{font-size:12px;color:#555;background:#fff8f0;border-left:3px solid #e8a060;border-radius:0 6px 6px 0;padding:8px 12px;line-height:1.7}
.anno strong{color:#b85000}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-right:6px;vertical-align:middle;flex-shrink:0}
.db{font-size:11px;color:#bbb;cursor:pointer;margin-left:4px;opacity:.5}
.db:hover{opacity:1;color:#c00}
.eb{font-size:12px;color:#aaa;cursor:pointer;margin-left:4px}
.eb:hover{color:#333}
.hint{font-size:12px;color:#999;margin-bottom:10px;line-height:1.6}
.stitle{font-size:14px;font-weight:600;margin-bottom:5px}
.tip{font-size:11px;color:#aaa}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center}
.mbg.on{display:flex}
.md{background:#fff;border-radius:12px;border:1px solid #ddd;padding:24px;width:400px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.14)}
.md h3{font-size:16px;font-weight:600;margin-bottom:14px}
.md label{font-size:13px;color:#555;display:block;margin-top:12px;margin-bottom:3px}
.md input,.md select{width:100%}
.md .sub{font-size:11px;color:#aaa;margin-top:3px}
.mbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.bpri{padding:7px 20px;border-radius:7px;border:none;background:#111;color:#fff;font-size:13px;cursor:pointer}
.bpri:hover{background:#333}
.bcan{padding:7px 20px;border-radius:7px;border:1px solid #ccc;background:transparent;color:#666;font-size:13px;cursor:pointer}

/* ── Login overlay ── */
#login-screen{display:none;position:fixed;inset:0;background:#f3f3f1;z-index:9999;align-items:center;justify-content:center;flex-direction:column}
#login-screen.on{display:flex}
.login-box{background:#fff;border:1px solid #e0e0de;border-radius:14px;padding:36px 40px;width:340px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.10)}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:6px;color:#111}
.login-box p{font-size:13px;color:#888;margin-bottom:24px}
.login-box label{font-size:13px;color:#555;display:block;margin-bottom:6px}
.login-box input[type=password]{width:100%;font-size:14px;padding:9px 12px;border-radius:8px;border:1.5px solid #ccc;background:#fafafa;height:auto;margin-bottom:8px}
.login-box input[type=password]:focus{border-color:#111;outline:none;background:#fff}
.login-err{font-size:12px;color:#b82020;min-height:18px;margin-bottom:8px}
.login-btn{width:100%;padding:10px;border-radius:8px;border:none;background:#111;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#333}
.logout-btn{font-size:12px;color:#aaa;cursor:pointer;border:none;background:transparent;padding:4px 8px;border-radius:4px;margin-left:8px}
.logout-btn:hover{color:#333;background:#eee}

/* ── Help page ── */
.help-wrap{max-width:720px;display:flex;flex-direction:column;gap:28px;padding:4px 0 24px}
.help-section{background:#fff;border:1px solid #e0e0de;border-radius:10px;padding:20px 24px}
.help-title{font-size:16px;font-weight:600;color:#111;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e8e8e6}
.help-sub{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
.help-p{font-size:13px;color:#444;line-height:1.7}
.help-list{font-size:13px;color:#444;line-height:1.8;padding-left:18px}
.help-list li{margin-bottom:2px}
.help-list code{font-family:monospace;background:#f0f0ee;padding:1px 5px;border-radius:3px;font-size:12px}
.help-table{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.ht-row{display:flex;align-items:flex-start;gap:12px;font-size:13px;color:#444;line-height:1.6}
.ht-label{font-size:12px;font-weight:500;background:#f0f0ee;color:#555;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.help-color{display:inline-block;width:14px;height:14px;border-radius:2px;vertical-align:middle;margin-right:6px;flex-shrink:0}

/* ── 與課程管制表統一視覺 ── */
body{font-family:'Noto Sans TC','Helvetica Neue',Arial,sans-serif;background:#F4F6F9;color:#1B2430}
.tabs{display:none}
html,body{height:100%}
.app{height:100%;display:flex;flex-direction:column;overflow:auto;padding:0}
#pg-schedule.on{display:flex;flex-direction:column;flex:1;min-height:0}
#pg-schedule .sw{flex:1;min-height:0;max-height:none;overflow:auto}
.bpri{background:#37668A;border-radius:8px}.bpri:hover{background:#2A506E}
.bsm{border-radius:8px;border-color:#E6E9EE}.bsm:hover{background:#EEF1F5;border-color:#37668A;color:#37668A}
select,input[type=text],input[type=date],input[type=number]{border-radius:8px;border-color:#E6E9EE}
.sw,.tw{border-color:#E6E9EE;border-radius:12px}
.st th,.dt th{background:#F1F4F8;color:#5A6573}
.st th.nc,.st td.ncc{position:sticky;left:0}
.tdy{background:#E9F0F5!important}
.md{border-radius:14px;border-color:#E6E9EE}
.av{font-weight:700}
</style>

<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen">
  <div class="login-box">
    <h2>差勤管理系統</h2>
    <p>請輸入存取密碼以繼續</p>
    <label>密碼</label>
    <input type="password" id="pwd-input" placeholder="請輸入密碼"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="app" id="main-app" style="display:block">
  <h1 style="display:none">差勤管理系統</h1>
  <div class="tabs">
    <button class="tb on" onclick="showPg('schedule',this)">月份時間表</button>
    <button class="tb" onclick="showPg('summary',this)">差勤總表</button>
    <button class="tb" onclick="showPg('help',this)">使用說明</button>
    <span id="sync-status" style="margin-left:auto;font-size:12px;color:#1a7a50;padding:10px 4px;transition:opacity 1s;opacity:0"></span>
  </div>

  <div class="pg on" id="pg-schedule">
    <div class="topbar">
      <label>月份</label>
      <select id="sym" onchange="render()"></select>
      <button class="bsm" id="lock-btn" onclick="toggleLock()" style="margin-left:4px"></button>
      <span id="lock-notice" style="font-size:12px;color:#b87010;display:none">📋 本月已鎖定，僅供檢視</span>
    </div>
    <div class="topbar" style="margin-top:-6px;margin-bottom:10px">
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#fff;border:1px solid #ddd"></div>平日</div>
        <div class="leg"><div class="leg-dot" style="background:#ffeae0"></div>假日／週末</div>
        <div class="leg"><div class="leg-dot" style="background:#ddeeff"></div>今天</div>
        <span class="tip" style="margin-left:8px">時間格式：HH:MM 或 HHMM（如 18:30 或 1830）；平日預設 10:00–19:00；假日空白；↑↓ 以 0.5h 調整</span>
      </div>
    </div>
    <div class="sw"><table class="st" id="stbl"></table></div>
  </div>

  <div class="pg" id="pg-summary">
    <div class="topbar">
      <label>月份</label>
      <select id="sym2" onchange="renderSum()"></select>
    </div>
    <div class="tw"><table class="dt" id="dtbl"></table></div>
    <div class="anno-box" id="anno-box"></div>
  </div>

  <!-- HELP PAGE -->
  <div class="pg" id="pg-help">
    <div class="help-wrap">
      <div class="help-section">
        <div class="help-title">月份時間表</div>
        <div class="help-sub">基本操作</div>
        <p class="help-p">選擇年份和月份後，表格會顯示該月每一天。每個格子由上到下分為：假別選單、上班時間、下班時間、休息時間、補休標籤。</p>
        <div class="help-sub">假別說明</div>
        <div class="help-table">
          <div class="ht-row"><span class="bx b特休">特休</span><span>全日休假，時間欄位自動鎖定。用完後選項變灰無法選取。</span></div>
          <div class="ht-row"><span class="bx b病假">病假</span><span>可全日（不填時間，計 8 小時）或半日（填入時間，依實際計算）。</span></div>
          <div class="ht-row"><span class="bx b事假">事假</span><span>可全日（不填時間，計 8 小時）或半日（填入時間，依實際計算）。</span></div>
          <div class="ht-row"><span class="bx b補休">補休</span><span>使用補休假，扣除 8 小時補休餘額。</span></div>
          <div class="ht-row"><span class="bx b上課假">上課假</span><span>每月有上限，達到上限後選項變灰無法選取。</span></div>
        </div>
        <div class="help-sub">時間輸入</div>
        <ul class="help-list">
          <li>支援格式：<code>10:00</code>、<code>1000</code>、<code>1030</code></li>
          <li>平日預設：上班 10:00、下班 19:00、休息 01:00</li>
          <li>鍵盤 ↑↓ 可以 30 分鐘為單位調整，游標點入欄位後使用</li>
          <li>假日與週末欄位預設空白</li>
        </ul>
      </div>
      <div class="help-section">
        <div class="help-title">差勤總表</div>
        <p class="help-p">顯示每位員工當月的請假與補休統計。</p>
      </div>
      <div class="help-section">
        <div class="help-title">員工管理</div>
        <ul class="help-list">
          <li>點擊員工名稱旁的 <b>✎</b> 可編輯員工資料</li>
          <li>點擊 <b>✕</b> 可刪除員工（同時刪除該員工所有差勤記錄）</li>
          <li>點擊頁面上方「＋ 新增員工」可新增</li>
        </ul>
      </div>
    </div>
  </div>
</div><!-- end .app -->

<div class="mbg" id="memp">
  <div class="md">
    <h3 id="memp-title">新增員工</h3>
    <label>姓名</label><input type="text" id="e-name" placeholder="員工姓名"/>
    <label>到職日期</label><input type="date" id="e-join"/>
    <label>每月上課假上限（天）</label><input type="number" id="e-classmax" value="2" min="0" max="31"/>
    <label>補休餘額基數（小時）</label><input type="number" id="e-compbal" value="0" step="0.5"/>
    <div class="sub" id="e-compbal-hint"></div>
    <div class="mbtns">
      <button class="bcan" onclick="closeEmpModal()">取消</button>

<script>
const MEMLS={_d:{},getItem(k){return (k in this._d)?this._d[k]:null;},setItem(k,v){this._d[k]=String(v);},removeItem(k){delete this._d[k];}};
const MEMSS={_d:{},getItem(k){return (k in this._d)?this._d[k]:null;},setItem(k,v){this._d[k]=String(v);},removeItem(k){delete this._d[k];}};

// ══════════════════════════════════════════
// ── 設定區 ──
// ══════════════════════════════════════════

// ⚠️ 請修改以下密碼（可以用中文或英文）

// ══════════════════════════════════════════
// ── 系統常數 ──
// ══════════════════════════════════════════
const DEFAULT_IN=10.0,DEFAULT_OUT=19.0,DEFAULT_BRK=1.0,STD=8,STEP=0.5;
const LT=['','特休','病假','事假','補休','上課假'];
const AVC=[['#ddeeff','#1a5a9a'],['#eeecff','#4a3899'],['#e8f5e2','#2a5e15'],['#fef0da','#7a4a0a'],['#fde8f2','#7a2060'],['#f0f0ee','#444']];
const TW_CAL={
  '2024-1-1':1,'2024-2-8':1,'2024-2-9':1,'2024-2-10':1,'2024-2-11':1,'2024-2-12':1,'2024-2-13':1,'2024-2-14':1,'2024-2-17':2,'2024-2-28':1,'2024-3-2':1,'2024-4-4':1,'2024-4-5':1,'2024-5-1':1,'2024-6-10':1,'2024-9-17':1,'2024-10-10':1,
  '2025-1-1':1,'2025-1-27':1,'2025-1-28':1,'2025-1-29':1,'2025-1-30':1,'2025-1-31':1,'2025-2-1':1,'2025-2-4':2,'2025-2-28':1,'2025-4-3':1,'2025-4-4':1,'2025-4-5':1,'2025-5-1':1,'2025-5-29':1,'2025-5-30':1,'2025-5-31':1,'2025-6-1':2,'2025-9-27':1,'2025-10-2':1,'2025-10-4':2,'2025-10-6':1,'2025-10-10':1,
  '2026-1-1':1,'2026-2-14':1,'2026-2-15':1,'2026-2-16':1,'2026-2-17':1,'2026-2-18':1,'2026-2-19':1,'2026-2-20':1,'2026-2-21':1,'2026-2-22':1,'2026-2-27':1,'2026-2-28':1,'2026-3-1':1,'2026-4-3':1,'2026-4-4':1,'2026-4-5':1,'2026-4-6':1,'2026-5-1':1,'2026-5-2':1,'2026-5-3':1,'2026-6-19':1,'2026-6-20':1,'2026-6-21':1,'2026-9-25':1,'2026-9-26':1,'2026-9-27':1,'2026-9-28':1,'2026-10-9':1,'2026-10-10':1,'2026-10-11':1,'2026-10-24':1,'2026-10-25':1,'2026-10-26':1,'2026-12-25':1,'2026-12-26':1,'2026-12-27':1
};

function ck(y,m,d){return `${y}-${m+1}-${d}`;}
function calVal(y,m,d){return TW_CAL[ck(y,m,d)]||0;}
function isWE(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6;}
function isOff(y,m,d){const v=calVal(y,m,d);if(v===2)return false;if(v===1)return true;return isWE(y,m,d);}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function getDOW(y,m,d){return new Date(y,m,d).getDay();}
function fmtH(h){if(h===null||h===undefined||h==='') return '';const hh=Math.floor(h),mm=Math.round((h-hh)*60);return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function parseH(s){if(s===null||s===undefined||String(s).trim()==='') return null;s=String(s).trim().replace(/\s/g,'');let h,m=0;if(s.includes(':')){const pts=s.split(':');h=parseInt(pts[0],10)||0;m=parseInt(pts[1],10)||0;}else if(s.length===4&&/^\d{4}$/.test(s)){h=parseInt(s.slice(0,2),10);m=parseInt(s.slice(2),10);}else if(s.length===3&&/^\d{3}$/.test(s)){h=parseInt(s.slice(0,1),10);m=parseInt(s.slice(1),10);}else{const f=parseFloat(s);if(isNaN(f))return null;h=Math.floor(f);m=Math.round((f-h)*60);}if(isNaN(h)||isNaN(m)) return null;return Math.round((h+m/60)/STEP)*STEP;}
function svcMonths(joinDate,ref){const j=new Date(joinDate),r=new Date(ref);const mos=(r.getFullYear()-j.getFullYear())*12+(r.getMonth()-j.getMonth());return r.getDate()>=j.getDate()?mos:mos-1;}
function annualDaysByMonths(mos){if(mos<6) return 0;if(mos<12) return 3;const y=Math.floor(mos/12);if(y<2) return 7;if(y<3) return 10;if(y<5) return 14;if(y<10) return 15;return Math.min(15+(y-10)+1,30);}
function annualDays(emp,refDate){return annualDaysByMonths(svcMonths(emp.joinDate,refDate));}
function annResetDates(joinDate){const j=new Date(joinDate),resets=[];resets.push(new Date(j.getFullYear(),j.getMonth()+6,j.getDate()));for(let yr=1;yr<=50;yr++) resets.push(new Date(j.getFullYear()+yr,j.getMonth(),j.getDate()));return resets;}
function getResetInfo(emp,today){const resets=annResetDates(emp.joinDate);let lastReset=null,nextReset=null;for(let i=0;i<resets.length;i++){if(resets[i]<=today) lastReset=resets[i];else{nextReset=resets[i];break;}}return {lastReset,nextReset};}
function compResetDates(joinDate){const j=new Date(joinDate),resets=[];for(let yr=1;yr<=50;yr++) resets.push(new Date(j.getFullYear()+yr,j.getMonth(),j.getDate()));return resets;}
function getCompResetInfo(emp,today){const resets=compResetDates(emp.joinDate);let lastReset=null,nextReset=null;for(let i=0;i<resets.length;i++){if(resets[i]<=today) lastReset=resets[i];else{nextReset=resets[i];break;}}return {lastReset,nextReset};}
function fmtDateFull(d){if(!d) return '—';return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;}

let emps=[],att={},nid=1,editEmpId=null;
function K(e,y,m,d){return `${e}-${y}-${m}-${d}`;}

// ── Lock management ──
function lockKey(y,m){return `lock-${y}-${m}`;}
function isMonthPast(y,m){const now=new Date();return y<now.getFullYear()||(y===now.getFullYear()&&m<now.getMonth());}
function isLocked(y,m){const k=lockKey(y,m);const stored=MEMLS.getItem(k);if(stored!==null) return stored==='1';return isMonthPast(y,m);}
function toggleLock(){const {y,m}=getYM(1);const k=lockKey(y,m);const current=isLocked(y,m);MEMLS.setItem(k,current?'0':'1');render();}
function updateLockUI(y,m){const locked=isLocked(y,m);const isPast=isMonthPast(y,m);const btn=document.getElementById('lock-btn');const notice=document.getElementById('lock-notice');if(btn){btn.style.display=isPast?'inline':'none';btn.textContent=locked?'🔓 解鎖本月':'🔒 鎖定本月';btn.style.color=locked?'#b87010':'#555';}if(notice) notice.style.display=(isPast&&locked)?'inline':'none';}

function daySickHours(eid,y,m,d){const rec=att[K(eid,y,m,d)]||{};if((rec.leave||'')!=='病假') return 0;const hasTime=(rec.inH!=null||rec.outH!=null);if(!hasTime) return STD;const inH=rec.inH!=null?rec.inH:DEFAULT_IN;const outH=rec.outH!=null?rec.outH:DEFAULT_OUT;if(outH<=inH) return 0;const brk=rec.brk!=null?rec.brk:DEFAULT_BRK;const workedH=Math.max(0,outH-inH-brk);return +Math.max(0,STD-workedH).toFixed(1);}
function monthSickHours(eid,y,m){let total=0;for(let d=1;d<=dim(y,m);d++) total+=daySickHours(eid,y,m,d);return +total.toFixed(1);}
function dayPersonalHours(eid,y,m,d){const rec=att[K(eid,y,m,d)]||{};if((rec.leave||'')!=='事假') return 0;const hasTime=(rec.inH!=null||rec.outH!=null);if(!hasTime) return STD;const inH=rec.inH!=null?rec.inH:DEFAULT_IN;const outH=rec.outH!=null?rec.outH:DEFAULT_OUT;if(outH<=inH) return 0;const brk=rec.brk!=null?rec.brk:DEFAULT_BRK;const workedH=Math.max(0,outH-inH-brk);return +Math.max(0,STD-workedH).toFixed(1);}
function monthPersonalHours(eid,y,m){let total=0;for(let d=1;d<=dim(y,m);d++) total+=dayPersonalHours(eid,y,m,d);return +total.toFixed(1);}
function dayComp(eid,y,m,d){const rec=att[K(eid,y,m,d)]||{};const leave=rec.leave||'',off=isOff(y,m,d);if(!off){if(leave==='補休') return -STD;if(['特休','病假','事假','上課假'].includes(leave)) return 0;}const hasTime=(rec.inH!=null||rec.outH!=null);if(!hasTime) return 0;const inH=rec.inH!=null?rec.inH:DEFAULT_IN,outH=rec.outH!=null?rec.outH:DEFAULT_OUT;if(outH<=inH) return 0;const brk=rec.brk!=null?rec.brk:(off?0:DEFAULT_BRK);const net=Math.max(0,outH-inH-brk);if(off) return +net.toFixed(2);return +(net-STD).toFixed(2);}
function compInRange(eid,sy,sm,sd,ey,em,ed){let total=0,cy=sy,cm=sm;while(cy<ey||(cy===ey&&cm<=em)){const days=dim(cy,cm),dStart=(cy===sy&&cm===sm)?sd:1,dEnd=(cy===ey&&cm===em)?ed:days;for(let d=dStart;d<=dEnd;d++) total+=dayComp(eid,cy,cm,d);cm++;if(cm>11){cm=0;cy++;}}return +total.toFixed(1);}
function countLInRange(eid,sy,sm,sd,ey,em,ed,type){let count=0,cy=sy,cm=sm;while(cy<ey||(cy===ey&&cm<=em)){const days=dim(cy,cm),dStart=(cy===sy&&cm===sm)?sd:1,dEnd=(cy===ey&&cm===em)?ed:days;for(let d=dStart;d<=dEnd;d++){const r=att[K(eid,cy,cm,d)]||{};if((r.leave||'')===type)count++;}cm++;if(cm>11){cm=0;cy++;}}return count;}
function countL(eid,y,m,type){let c=0;for(let d=1;d<=dim(y,m);d++){const r=att[K(eid,y,m,d)]||{};if((r.leave||'')===type)c++;}return c;}
function annLeaveState(emp,periodEnd){const allResets=annResetDates(emp.joinDate);let lastReset=null,nextReset=null;for(let i=0;i<allResets.length;i++){if(allResets[i]<=periodEnd) lastReset=allResets[i];else{nextReset=allResets[i];break;}}if(!lastReset) return {totalDays:0,usedDays:0,remainDays:0,nextReset};const totalDays=annualDaysByMonths(svcMonths(emp.joinDate,lastReset));const usedDays=countLInRange(emp.id,lastReset.getFullYear(),lastReset.getMonth(),lastReset.getDate(),periodEnd.getFullYear(),periodEnd.getMonth(),periodEnd.getDate(),'特休');return {totalDays,usedDays,remainDays:Math.max(0,totalDays-usedDays),nextReset};}
function compBalState(emp,periodEnd){const allCompResets=compResetDates(emp.joinDate);let lastReset=null,nextReset=null;for(let i=0;i<allCompResets.length;i++){if(allCompResets[i]<=periodEnd) lastReset=allCompResets[i];else{nextReset=allCompResets[i];break;}}let bal;if(!lastReset){const j=new Date(emp.joinDate);bal=+(emp.compBal+compInRange(emp.id,j.getFullYear(),j.getMonth(),j.getDate(),periodEnd.getFullYear(),periodEnd.getMonth(),periodEnd.getDate())).toFixed(1);}else{bal=compInRange(emp.id,lastReset.getFullYear(),lastReset.getMonth(),lastReset.getDate(),periodEnd.getFullYear(),periodEnd.getMonth(),periodEnd.getDate());}return {bal:+bal.toFixed(1),nextReset};}
function countLMonth(eid,y,m,type){return countL(eid,y,m,type);}

function initSel(){
  const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
  let html='';
  for(let y=cy-2;y<=cy+1;y++)for(let m=0;m<12;m++)html+=`<option value="${y}-${m}"${(y===cy&&m===cm)?' selected':''}>${y}/${String(m+1).padStart(2,'0')}</option>`;
  ['sym','sym2'].forEach(id=>{const s=document.getElementById(id);if(s)s.innerHTML=html;});
}
function getYM(n){const v=String((document.getElementById(n===1?'sym':'sym2')||{}).value||'').split('-');return {y:+v[0],m:+v[1]};}

function render(){
  const {y,m}=getYM(1),days=dim(y,m),now=new Date();
  const locked=isLocked(y,m);
  updateLockUI(y,m);
  const tbl=document.getElementById('stbl');
  const monthEnd=new Date(y,m+1,0);
  const state={};
  emps.forEach(e=>{
    const {remainDays:annRemain,totalDays:annTotal,usedDays:annUsed}=annLeaveState(e,monthEnd);
    const {bal:compBal}=compBalState(e,monthEnd);
    const classUsed=countL(e.id,y,m,'上課假');
    state[e.id]={annRemain,annTotal,annUsed,compBal,classUsed};
  });
  const COL_NAME=130,COL_DAY=80,COL_SUM=200;
  const totalW=COL_NAME+days*COL_DAY+COL_SUM;
  let h=`<colgroup><col style="width:${COL_NAME}px">`;
  for(let d=1;d<=days;d++) h+=`<col style="width:${COL_DAY}px">`;
  h+=`<col style="width:${COL_SUM}px"></colgroup>`;
  h+='<thead><tr><th class="nc">員工</th>';
  for(let d=1;d<=days;d++){
    const w=getDOW(y,m,d),off=isOff(y,m,d),td=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
    const cls=(off?'offday':'')+(td?(off?' tdy':'tdy'):'');
    h+=`<th class="${cls}">${d}<br><span style="font-size:9px;font-weight:400">${['日','一','二','三','四','五','六'][w]}</span></th>`;
  }
  h+='<th class="mc">月計</th></tr></thead>';
  let b='<tbody>';
  emps.forEach((emp,ei)=>{
    const ac=AVC[ei%AVC.length];
    const {annRemain,annTotal,compBal,classUsed}=state[emp.id];
    const annExhausted=annTotal>0&&annRemain<=0;
    let lc={};LT.slice(1).forEach(t=>lc[t]=0);
    let mCompTotal=0;
    let row=`<tr><td class="ncc" style="text-align:center">
      <span class="av" style="background:${ac[0]};color:${ac[1]}">${emp.name[0]}</span>${emp.name}
    </td>`;
    for(let d=1;d<=days;d++){
      const off=isOff(y,m,d),td=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
      const k=K(emp.id,y,m,d),rec=att[k]||{};
      const leave=rec.leave||'';
      const storedIn=rec.inH!=null?rec.inH:null,storedOut=rec.outH!=null?rec.outH:null,storedBrk=rec.brk!=null?rec.brk:null;
      if(leave) lc[leave]=(lc[leave]||0)+1;
      const comp=dayComp(emp.id,y,m,d);
      mCompTotal+=comp;
      const cellCls=(off?'offday':'')+(td?(off?' tdy':'tdy'):'');
      const isFullDay=FULL_LEAVES.includes(leave);
      const phIn=(off||isFullDay)?'':fmtH(DEFAULT_IN);
      const phOut=(off||isFullDay)?'':fmtH(DEFAULT_OUT);
      const phBrk=(off||isFullDay)?'':fmtH(DEFAULT_BRK);
      let opts=LT.map(lt=>{
        let dis=false;
        if(lt==='上課假'&&lt!==leave&&classUsed>=emp.classMax) dis=true;
        if(lt==='特休'&&lt!==leave&&annExhausted) dis=true;
        return `<option value="${lt}"${leave===lt?' selected':''}${dis?' disabled':''} style="${dis?'color:#ccc':''}">${lt||'—'}</option>`;
      }).join('');
      let ctag='';
      const cr=+comp.toFixed(1);
      if(cr>0) ctag=`<span class="comp-tag cp">+${cr}h</span>`;
      else if(cr<0) ctag=`<span class="comp-tag cn">${cr}h</span>`;
      else if(storedIn!==null||storedOut!==null) ctag=`<span class="comp-tag cz">±0h</span>`;
      row+=`<td class="${cellCls}"><div class="dc">
        <select class="lv-sel" ${locked?'disabled style="background:#f4f4f2;color:#aaa"':''} onchange="setLeave(${emp.id},${y},${m},${d},this.value)">${opts}</select>
        <div class="time-stack">
          <div class="time-field">
            <span class="time-lbl">上</span>
            <input class="ti${storedIn!==null?' has-val':''}" type="text" maxlength="5" placeholder="${phIn}" value="${storedIn!==null?fmtH(storedIn):''}"
              ${(isFullDay||locked)?'disabled style="background:#f4f4f2;color:#ccc;border-color:#eee"':''}
              onblur="setTime(${emp.id},${y},${m},${d},'in',this.value)"
              onkeydown="timeKey(event,this,${emp.id},${y},${m},${d},'in')">
          </div>
          <div class="time-field">
            <span class="time-lbl">下</span>
            <input class="ti${storedOut!==null?' has-val':''}" type="text" maxlength="5" placeholder="${phOut}" value="${storedOut!==null?fmtH(storedOut):''}"
              ${(isFullDay||locked)?'disabled style="background:#f4f4f2;color:#ccc;border-color:#eee"':''}
              onblur="setTime(${emp.id},${y},${m},${d},'out',this.value)"
              onkeydown="timeKey(event,this,${emp.id},${y},${m},${d},'out')">
          </div>
          <div class="time-field">
            <span class="time-lbl" style="color:#e0a060">休</span>
            <input class="ti${storedBrk!==null?' has-val':''}" type="text" maxlength="5" placeholder="${phBrk}" value="${storedBrk!==null?fmtH(storedBrk):''}"
              ${(isFullDay||locked)?'disabled style="background:#f4f4f2;color:#ccc;border-color:#eee"':''}
              onblur="setBreak(${emp.id},${y},${m},${d},this.value)"
              onkeydown="timeKey(event,this,${emp.id},${y},${m},${d},'brk')">
          </div>
        </div>
        ${ctag}
      </div></td>`;
    }
    let parts=[];
    const sickH=monthSickHours(emp.id,y,m);
    if(sickH>0) parts.push(`<span class="bx b病假">病假 ${sickH}h</span>`);
    const personalH=monthPersonalHours(emp.id,y,m);
    if(personalH>0) parts.push(`<span class="bx b事假">事假 ${personalH}h</span>`);
    ['特休','補休','上課假'].forEach(t=>{if(lc[t]>0)parts.push(`<span class="bx b${t}">${t} ${lc[t]}天</span>`);});
    const mc=+mCompTotal.toFixed(1);
    if(mc>0) parts.push(`<span class="bx" style="background:#e2f5e8;color:#1a6a35">補休+${mc}h</span>`);
    else if(mc<0) parts.push(`<span class="bx" style="background:#fde8e8;color:#8a1a1a">補休${mc}h</span>`);
    if(classUsed>=emp.classMax&&emp.classMax>0) parts.push(`<span class="bx" style="background:#fde8e8;color:#8a1a1a">上課假達上限</span>`);
    if(annExhausted) parts.push(`<span class="bx" style="background:#fde8e8;color:#8a1a1a">特休已用完</span>`);
    // Consecutive work warning
    const prevDays=6;
    let streak=0,streakStart=null,warnings=[];
    const checkDays=[];
    const prevM=m===0?11:m-1,prevY=m===0?y-1:y;
    const prevTotal=dim(prevY,prevM);
    for(let d=prevTotal-prevDays+1;d<=prevTotal;d++) checkDays.push({y:prevY,m:prevM,d});
    for(let d=1;d<=days;d++) checkDays.push({y,m,d});
    const flushStreak=(endDay)=>{
      if(streak>=7&&endDay){
        const endInMonth=(endDay.y===y&&endDay.m===m);
        const startInMonth=(streakStart.y===y&&streakStart.m===m);
        if(endInMonth||startInMonth){
          const startStr=`${streakStart.m+1}/${streakStart.d}`;
          const endStr=`${endDay.m+1}/${endDay.d}`;
          warnings.push(`⚠ 連續上班 ${streak} 天（${startStr}–${endStr}）`);
        }
      }
      streak=0;streakStart=null;
    };
    checkDays.forEach(({y:cy,m:cm,d:cd},idx)=>{
      const off=isOff(cy,cm,cd);
      const rec=att[K(emp.id,cy,cm,cd)]||{};
      const leave=rec.leave||'';
      const FULL=['特休','病假','事假','補休','上課假'];
      let worked=false;
      if(!off) worked=!FULL.includes(leave);
      else worked=(rec.inH!=null||rec.outH!=null);
      if(worked){if(streak===0) streakStart={y:cy,m:cm,d:cd};streak++;}
      else{flushStreak(idx>0?checkDays[idx-1]:null);}
    });

    warnings.forEach(w=>{parts.push(`<span class="bx" style="background:#fff0cc;color:#7a5000;border:1px solid #e8c840">${w}</span>`);});

function timeKey(e,el,eid,y,m,d,which){
  if(e.key!=='ArrowUp'&&e.key!=='ArrowDown') return;
  e.preventDefault();
  const k=K(eid,y,m,d),rec=att[k]||{},off=isOff(y,m,d);
  const field=which==='in'?'inH':which==='out'?'outH':'brk';
  const def=which==='in'?DEFAULT_IN:which==='out'?DEFAULT_OUT:(off?0:DEFAULT_BRK);
  let cur=rec[field]!=null?rec[field]:(off&&which==='brk'?0:def);
  let nv=Math.round((cur+(e.key==='ArrowUp'?STEP:-STEP))/STEP)*STEP;
  nv=Math.max(0,Math.min(24,nv));
  if(!att[k]) att[k]={};
  att[k][field]=nv;
  el.value=fmtH(nv);el.classList.add('has-val');
  const comp=dayComp(eid,y,m,d),cell=el.closest('td'),existing=cell.querySelector('.comp-tag');
  const cr=+comp.toFixed(1);
  let tagHtml=cr>0?`<span class="comp-tag cp">+${cr}h</span>`:cr<0?`<span class="comp-tag cn">${cr}h</span>`:`<span class="comp-tag cz">±0h</span>`;
  if(existing) existing.outerHTML=tagHtml;
  else cell.querySelector('.dc').insertAdjacentHTML('beforeend',tagHtml);
  el.focus();
  apiSetAtt(k,att[k]);
}

      const compPrevResets=compResets.filter(d=>d<rDate);

    compResetsThisMonth.filter(cr=>!annResetsThisMonth.some(ar=>ar.getTime()===cr.getTime())).forEach(rDate=>{

  }
});

function activeFromCats(cats,catName,progress){const d=cats.find(x=>x.name===catName)||{};const a={};NODE_DEFS.forEach(n=>a[n.key]=!!d[n.key]||!!(progress&&progress[n.key]));return a;}
function normalizeCourses(st){st.courses.forEach(c=>{c.progress=c.progress||{};if(!c.links)c.links={sheet:'',gear:''};if(!c.active)c.active=activeFromCats(st.categories,c.category,c.progress);});}

let S=null,serialOf={},saveTimer=null,archiveView=false;
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num=v=>{const n=parseFloat(String(v).replace(/[, ]/g,''));return isNaN(n)?0:n;};
const fmt=n=>Math.round(n).toLocaleString('zh-TW');
function persist(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>DataStore.save(S),250);}
function findCourse(id){return S.courses.find(c=>c.id===id);}
function instrByName(n){return S.instructors.find(i=>i.name===n);}
function isInternal(n){const o=instrByName(n);return o?o.type==='內部':false;}
function catDef(name){return S.categories.find(c=>c.name===name)||{signin:1,cert:1,student:1,instr:1,invoice:1,payment:1,name};}
function ym(d){return String(d||'').slice(0,6);}
function fmtDate(d){d=String(d);if(d.length!==8)return d;return (+d.slice(4,6))+'/'+(+d.slice(6,8));}
function fmtDateFull(d){d=String(d);if(d.length!==8)return d;return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8);}
function weekday(d){d=String(d);if(d.length!==8)return'';return '週'+['日','一','二','三','四','五','六'][new Date(+d.slice(0,4),+d.slice(4,6)-1,+d.slice(6,8)).getDay()];}
function courseInstrs(c){return [...c.instructors,...c.assistants];}
function uniqInstrs(c){return courseInstrs(c).filter((n,i,a)=>a.indexOf(n)===i);}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

/* ===== serials（每年初歸零，依日期排序） ===== */
function computeSerials(){
  serialOf={};const byYear={};
  S.courses.slice().sort((a,b)=>(a.date+(a.sessions[0]?a.sessions[0].time:'')).localeCompare(b.date+(b.sessions[0]?b.sessions[0].time:''))).forEach(c=>{
    const y=String(c.date).slice(0,4);byYear[y]=(byYear[y]||0)+1;serialOf[c.id]={year:y,n:byYear[y]};
  });
}
function serialLabel(id){const s=serialOf[id];return s?`${String(s.n).padStart(3,'0')}<small>${s.year}</small>`:'—';}

/* ===== months / filters ===== */
function monthsInData(){return [...new Set(S.courses.map(c=>ym(c.date)).filter(s=>s.length===6))].sort().reverse();}
function fillMonthSelect(sel,withAll){const m=monthsInData();sel.innerHTML=(withAll?'<option value="">全部月份</option>':'')+m.map(x=>`<option value="${x}">${x.slice(0,4)}/${x.slice(4)}</option>`).join('');}

/* ===== courses render ===== */
function renderCourses(){
  computeSerials();
  const month=$('#fMonth').value,cat=$('#fCat').value,q=$('#fSearch').value.trim();
  let list=S.courses.slice().sort((a,b)=>a.date.localeCompare(b.date)).filter(c=>{
    if(archiveView){if(!c.archived)return false;}else{if(c.archived)return false;}
    if(month&&ym(c.date)!==month)return false;
    if(cat&&c.category!==cat)return false;
    if(q){const hay=[c.name,c.address,c.contact,...courseInstrs(c)].join(' ');if(!hay.includes(q))return false;}
    return true;
  });
  const host=$('#courseList');
  const banner=archiveView?`<div class="archhead">${ICON_ARCH} 封存課程　·　展開任一課程可「解除封存」</div>`:'';
  if(!list.length){
    const msg=archiveView?'封存區目前沒有課程。':'沒有符合的課程。換個篩選條件，或按「＋ 新增課程」。';
    host.innerHTML=banner+'<div class="empty-hint" style="padding:30px;text-align:center">'+msg+'</div>';return;
  }
  host.innerHTML=banner+list.map(c=>{
    const f=courseFlags(c);
    const cls=['course'];if(c.archived)cls.push('arch');if(isThisWeek(c.date))cls.push('thisweek');if(f.remind)cls.push('warn-remind');else if(f.incomplete)cls.push('warn-incomplete');
    const ttl=flagTitle(f);
    return `<div class="${cls.join(' ')}" data-id="${c.id}"${ttl?` title="${esc(ttl)}"`:''}><div class="crow" onclick="toggleCourse('${c.id}')">${crowInner(c)}</div><div class="cbody">${courseBodyHTML(c)}</div></div>`;
  }).join('');
}
/* ---- 警示與本週 ---- */
function todayMid(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function dateFromYmd(s){return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));}
function isThisWeek(ds){const t=todayMid();const dow=(t.getDay()+6)%7;const mon=new Date(t);mon.setDate(t.getDate()-dow);const sun=new Date(mon);sun.setDate(mon.getDate()+6);const d=dateFromYmd(ds);return d>=mon&&d<=sun;}
function courseFlags(c){
  let remind=false,dataMissing=false,billMissing=false;
  if(!c.archived){
    const days=Math.round((dateFromYmd(c.date)-todayMid())/86400000);
    const a=c.active||{},p=c.progress||{},b=c.billing||{};
    // 進度：課程兩日內，學生／講師提醒未勾
    if(days>=0&&days<=2&&((a.student&&!p.student)||(a.instr&&!p.instr)))remind=true;
    // 資料不完整：除聯絡人、備註、助教外都要有（名稱／地址／指導員／梯次時間與人數）
    if(!String(c.name||'').trim()||!String(c.address||'').trim()||!(c.instructors&&c.instructors.length)
       ||!(c.sessions&&c.sessions.length)||(c.sessions||[]).some(s=>!String(s.time||'').trim()||!String(s.count||'').trim()))dataMissing=true;
    // 請款／人事費：需請款的課程（分類含發票或款項）三個管道不能都沒勾
    if((a.invoice||a.payment)&&!(b.company||b.assoc||b.labor))billMissing=true;
  }
  return {remind,dataMissing,billMissing,incomplete:dataMissing||billMissing};
}
function flagTitle(f){
  const r=[];
  if(f.remind)r.push('課程兩日內，學生／講師提醒尚未勾選');
  if(f.dataMissing)r.push('資料不完整（名稱／地址／指導員／梯次時間與人數）');
  if(f.billMissing)r.push('請款／人事費三個管道皆未勾選');
  return r.join('；');
}
function crowInner(c){
  const nodes=NODE_DEFS.map(n=>{const on=c.active&&c.active[n.key],done=!!(c.progress&&c.progress[n.key]);
    if(!on)return `<span class="node off" title="此項目未啟用（展開課程可調整）"><span class="dot"></span>${n.label}</span>`;
    return `<span class="node ${done?'done':''}" title="點擊勾選 / 取消" onclick="event.stopPropagation();toggleNode('${c.id}','${n.key}')"><span class="dot">${done?'✓':''}</span>${n.label}</span>`;}).join('');
  const total=c.sessions.reduce((s,x)=>s+num(x.count),0);
  const timeStr=c.sessions.map(s=>{const t=s.time||'';const ct=(s.count!==''&&s.count!=null&&s.count!==undefined)?`(${s.count})`:'';return t?t+ct:ct;}).filter(Boolean).join(' / ');
  let pills='';const b=c.billing;
  if(b.company)pills+='<span class="pill company">公司</span>';
  if(b.assoc)pills+='<span class="pill assoc">協會</span>';
  if(b.labor)pills+='<span class="pill labor">勞報</span>';
  if(c.archived)pills+='<span class="pill arch">封存</span>';
  return `<div class="cserial">${serialLabel(c.id)}</div>
    <div class="cdate">${fmtDate(c.date)}<small>${weekday(c.date)}</small></div>
    <div class="cmid">
      <div class="cname">${esc(c.name)||'<span class="muted">（未命名課程）</span>'} <span class="muted" style="font-weight:500;font-size:14px">· ${esc(c.category)}</span></div>
      <div class="cmeta">
        <span><b class="ml">梯次</b> ${esc(timeStr)||'—'}${c.sessions.length>1&&total?` · 共${fmt(total)}人`:''}</span>
        <span><b class="ml">地點</b> ${esc(c.address)||'—'}</span>
        <span><b class="ml">指導員</b> ${esc(c.instructors.join('、'))||'—'}</span>
        ${c.assistants.length?`<span><b class="ml">助教</b> ${esc(c.assistants.join('、'))}</span>`:''}
        ${c.contact?`<span><b class="ml">聯絡人</b> ${esc(c.contact)}</span>`:''}
      </div>
      <div class="crow-nodes">${nodes}</div>
    </div>
    <div class="cright"><div class="top">${pills}<span class="chev">▶</span></div><div class="spacer"></div><div class="cright-actions">${(c.links&&c.links.sheet)?`<button class="linkbtn" onclick="event.stopPropagation();openLink('${c.id}','sheet')" title="開啟課程單">課程單</button>`:''}${(c.links&&c.links.gear)?`<button class="linkbtn" onclick="event.stopPropagation();openLink('${c.id}','gear')" title="開啟教具單連結">教具單</button>`:`<button class="linkbtn addgear" onclick="event.stopPropagation();window.open(GEAR_NEW_URL,'_blank','noopener')" title="到教具系統新增；完成後把連結貼回課程的「教具單」欄位">＋ 新增教具</button>`}<button class="linebtn ${c.lineSent?'sent':''}" onclick="event.stopPropagation();sendLineNotice('${c.id}')"${c.lineSent?` title="已於 ${esc(new Date(c.lineSent).toLocaleString('zh-TW'))} 送出"`:''}>${c.lineSent?'已通知':'LINE 通知'}</button></div></div>`;
}
function updateHeader(id){const card=document.querySelector(`.course[data-id="${id}"]`);const c=findCourse(id);if(!card||!c)return;const el=card.querySelector('.crow');if(el)el.innerHTML=crowInner(c);const f=courseFlags(c);card.classList.toggle('thisweek',isThisWeek(c.date));card.classList.toggle('warn-remind',f.remind);card.classList.toggle('warn-incomplete',!f.remind&&f.incomplete);const ttl=flagTitle(f);if(ttl)card.setAttribute('title',ttl);else card.removeAttribute('title');}
function toggleCourse(id){document.querySelector(`.course[data-id="${id}"]`)?.classList.toggle('open');}
function rebuildBody(id){const el=document.querySelector(`.course[data-id="${id}"] .cbody`);const c=findCourse(id);if(el&&c)el.innerHTML=courseBodyHTML(c);}
function toggleNode(id,key){const c=findCourse(id);c.active=c.active||{};c.progress=c.progress||{};if(!c.active[key])return;c.progress[key]=!c.progress[key];persist();updateHeader(id);}
function toggleNodeActive(id,key,v){const c=findCourse(id);c.active=c.active||{};c.progress=c.progress||{};c.active[key]=v;if(!v)c.progress[key]=false;persist();updateHeader(id);}

/* ----- inline field edits (focus-safe: only header re-renders) ----- */
function editField(id,f,v){
  const c=findCourse(id);c[f]=v;
  if(f==='category'){
    c.progress=c.progress||{};
    c.active=activeFromCats(S.categories,v,{});      // 依新分類重新帶出啟用項目
    Object.keys(c.progress).forEach(k=>{if(!c.active[k])c.progress[k]=false;}); // 關閉的項目清除已完成標記
    persist();rebuildBody(id);updateHeader(id);return;
  }
  persist();updateHeader(id);
}
function editLink(id,key,v){const c=findCourse(id);c.links=c.links||{sheet:'',gear:''};c.links[key]=v.trim();persist();updateHeader(id);}
function openLink(id,key){const c=findCourse(id),u=c&&c.links&&c.links[key];if(u)window.open(u,'_blank','noopener');}
function editDate(id,v){findCourse(id).date=v.replace(/-/g,'');persist();renderCourses();reopen(id);fillMonthSelect($('#fMonth'),true);fillMonthSelect($('#sMonth'),false);otDebounce(id);}
function editSession(id,i,f,v){findCourse(id).sessions[i][f]=v;persist();updateHeader(id);if(f==='time')otDebounce(id);}
function addSession(id){findCourse(id).sessions.push({time:'',count:''});persist();rebuildBody(id);updateHeader(id);}
function delSession(id,i){findCourse(id).sessions.splice(i,1);persist();rebuildBody(id);updateHeader(id);}
function reopen(id){const el=document.querySelector(`.course[data-id="${id}"]`);if(el){el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'center'});}}

function tagInputHTML(c,role){
  const chips=c[role].map((n,idx)=>`<span class="chip">${esc(n)}<i onclick="removeTag('${c.id}','${role}',${idx})">×</i></span>`).join('');
  return `<div class="taginput" id="tags-${role}-${c.id}">${chips}<input class="tag-entry" placeholder="輸入姓名…" oninput="suggestTags('${c.id}','${role}',this)" onkeydown="tagKey(event,'${c.id}','${role}',this)" onblur="hideSuggest('${c.id}','${role}')"><div class="tag-suggest" id="sg-${role}-${c.id}"></div></div>`;
}
function suggestTags(id,role,el){
  const c=findCourse(id),q=el.value.trim(),box=document.getElementById('sg-'+role+'-'+id);if(!box)return;
  if(!q){box.style.display='none';box.innerHTML='';return;}
  const m=S.instructors.filter(i=>i.name.includes(q)&&!c[role].includes(i.name)).slice(0,6);
  if(!m.length){box.style.display='none';box.innerHTML='';return;}
  box.innerHTML=m.map(i=>`<div class="sg-item" onmousedown="pickTag('${id}','${role}','${esc(i.name)}')">${esc(i.name)} <span class="muted" style="font-size:11px">${esc(i.phone)} · ${i.type}</span></div>`).join('');
  box.style.display='block';
}
function hideSuggest(id,role){setTimeout(()=>{const b=document.getElementById('sg-'+role+'-'+id);if(b){b.style.display='none';b.innerHTML='';}},150);}
function pickTag(id,role,name){addTagValue(id,role,name);}
function tagKey(e,id,role,el){if(e.key==='Enter'){e.preventDefault();const v=el.value.trim();if(v)addTagValue(id,role,v);}else if(e.key==='Backspace'&&el.value===''){const c=findCourse(id);if(c[role].length){c[role].pop();persist();rebuildBody(id);updateHeader(id);focusTag(id,role);}}}
function addTagValue(id,role,name){const c=findCourse(id);if(!c[role].includes(name))c[role].push(name);persist();rebuildBody(id);updateHeader(id);focusTag(id,role);if(role==='instructors'||role==='assistants')otDebounce(id);}
let _otTimer=null;
function otDebounce(id){clearTimeout(_otTimer);_otTimer=setTimeout(()=>checkOvertime(id),700);}
function removeTag(id,role,idx){findCourse(id)[role].splice(idx,1);persist();rebuildBody(id);updateHeader(id);}
function focusTag(id,role){const el=document.querySelector('#tags-'+role+'-'+id+' .tag-entry');if(el)el.focus();}

/* ----- billing: 公司 / 協會 / 勞報 ----- */
function chanTotalFee(c,ch){const pk=ch+'Pay',b=c.billing;return uniqInstrs(c).filter(n=>!isInternal(n)).reduce((s,n)=>{const p=(b[pk]||{})[n]||{};return s+num(p.fee);},0);}
function chanTotalTr(c,ch){const pk=ch+'Pay',b=c.billing;return uniqInstrs(c).filter(n=>!isInternal(n)).reduce((s,n)=>{const p=(b[pk]||{})[n]||{};return s+num(p.transport);},0);}
function laborTotal(c){const b=c.billing;return uniqInstrs(c).reduce((s,n)=>s+num((b.laborPay||{})[n]),0);}

function billingHTML(c){
  const b=c.billing,chk=k=>b[k]?'checked':'';
  let h=`<div class="billbox"><div class="billtop">
    <label class="toggle"><input type="checkbox" ${chk('company')} onchange="toggleBilling('${c.id}','company',this.checked)">公司發票請款</label>
    <label class="toggle"><input type="checkbox" ${chk('assoc')} onchange="toggleBilling('${c.id}','assoc',this.checked)">協會收據請款</label>
    <label class="toggle"><input type="checkbox" ${chk('labor')} onchange="toggleBilling('${c.id}','labor',this.checked)">勞報請款</label>
  </div>`;
  if(b.company)h+=channelSub(c,'company','公司發票','公司');
  if(b.assoc)h+=channelSub(c,'assoc','協會收據','協會');
  if(b.labor)h+=laborSub(c);
  if(!b.company&&!b.assoc&&!b.labor)h+=`<div class="empty-hint" style="margin-top:6px">尚未勾選請款方式。</div>`;
  return h+`</div>`;
}
function channelSub(c,ch,title,who){
  const b=c.billing,pk=ch+'Pay',ak=ch+'Amount';
  const ext=uniqInstrs(c).filter(n=>!isInternal(n));
  let h=`<div class="subbill"><h5>${title}</h5>
    <div class="moneyin"><span>請款金額（對方支付給${who}）</span><input class="num" value="${esc(b[ak]||'')}" placeholder="0" data-k="${ak}" oninput="editAmt('${c.id}',this.dataset.k,this.value)"></div>`;
  if(!ext.length){h+=`<div class="empty-hint">無外部講師。內部講師領月薪，此管道不另支付。</div>`;}
  else{
    h+=`<table class="grid"><thead><tr><th>外部講師</th><th>薪資</th><th>交通費</th></tr></thead><tbody>`+
      ext.map(n=>{const p=(b[pk]||{})[n]||{};return `<tr><td>${esc(n)}</td>
        <td style="width:130px"><input class="num" value="${esc(p.fee||'')}" placeholder="0" data-n="${esc(n)}" oninput="editChanPay('${c.id}','${pk}',this.dataset.n,'fee',this.value)"></td>
        <td style="width:130px"><input class="num" value="${esc(p.transport||'')}" placeholder="0" data-n="${esc(n)}" oninput="editChanPay('${c.id}','${pk}',this.dataset.n,'transport',this.value)"></td></tr>`;}).join('')+
      `</tbody></table><div class="total-row">薪資 <b id="tf-${ch}-${c.id}">$${fmt(chanTotalFee(c,ch))}</b> ｜ 交通費 <b id="tt-${ch}-${c.id}">$${fmt(chanTotalTr(c,ch))}</b></div>`;
  }
  return h+`</div>`;
}
function laborSub(c){
  const b=c.billing,all=uniqInstrs(c);
  let h=`<div class="subbill"><h5>勞報</h5>`;
  if(!all.length)h+=`<div class="empty-hint">尚未填寫講師/助教。</div>`;
  else h+=`<table class="grid"><thead><tr><th>姓名</th><th>薪資</th><th></th></tr></thead><tbody>`+
    all.map(n=>{const inside=isInternal(n),amt=(b.laborPay||{})[n]||'';return `<tr>
      <td>${esc(n)} <span class="typebadge ${inside?'in':'out'}">${inside?'內部':'外部'}</span></td>
      <td style="width:130px"><input class="num" value="${esc(amt)}" placeholder="0" data-n="${esc(n)}" oninput="editLaborPay('${c.id}',this.dataset.n,this.value)"></td>
      <td style="width:130px"></td></tr>`;}).join('')+
    `</tbody></table><div class="total-row">勞報總額 <b id="tl-${c.id}">$${fmt(laborTotal(c))}</b></div>`;
  return h+`</div>`;
}

function editChanPay(id,pk,name,field,val){const b=findCourse(id).billing;(b[pk][name]=b[pk][name]||{})[field]=val;persist();const ch=pk.replace('Pay','');const c=findCourse(id);const ef=document.getElementById('tf-'+ch+'-'+id),et=document.getElementById('tt-'+ch+'-'+id);if(ef)ef.textContent='$'+fmt(chanTotalFee(c,ch));if(et)et.textContent='$'+fmt(chanTotalTr(c,ch));}

/* ----- LINE：訊息格式同你原本的課前通知；經 Apps Script 端點推播 ----- */
function buildLineMessage(c){
  const ph=n=>{const o=instrByName(n);return o&&o.phone?n+' '+o.phone:n;};
  const instr=c.instructors.map(ph).join('、');
  const assist=c.assistants.map(ph).join('、');
  const time=c.sessions.map(s=>s.time).filter(Boolean).join(' ');
  const people=c.sessions.map(s=>s.count).filter(Boolean).join('、');
  let m='【課前通知】'+c.name+'\n\n時間：'+fmtDateFull(c.date)+' '+time+'\n人數：'+people+'\n講師：'+instr;
  if(assist)m+='\n助教：'+assist;
  m+='\n地址：'+c.address;
  if(c.contact)m+='\n聯絡人：'+c.contact;
  if(c.note)m+='\n\n注意事項：\n'+c.note;
  return m;
}
async function sendLineNotice(id){
  const c=findCourse(id);
  const ids=[...new Set(uniqInstrs(c).map(n=>instrByName(n)).filter(o=>o&&o.userId).map(o=>o.userId))];
  const noId=uniqInstrs(c).filter(n=>{const o=instrByName(n);return !o||!o.userId;});
  const msg=buildLineMessage(c);
  const endpoint=(S.settings&&S.settings.lineEndpoint)||'';
  if(!endpoint){
    alert('尚未設定發送端點。\n請到 ⚙ 設定 → 通知設定 貼上 Apps Script 的 /exec 網址。\n\n— 預覽訊息 —\n\n'+msg+'\n\n收件 userId：'+(ids.join(', ')||'（無）'));
    return;
  }
  if(!ids.length){alert('此課程的講師/助教都沒有 LINE userId，無法發送。請到設定補上 userId。');return;}
  if(!confirm('發送課前通知給：'+uniqInstrs(c).join('、')+'\n（'+ids.length+' 個 LINE 帳號）'+(noId.length?'\n略過無 userId：'+noId.join('、'):'')+'\n\n確定發送？'))return;
  try{
    await fetch(endpoint,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({to:ids,message:msg})});
    c.lineSent=new Date().toISOString();c.active=c.active||{};c.progress=c.progress||{};c.active.instr=true;c.progress.instr=true;persist();updateHeader(id);
    toast('已送出 LINE 通知（'+ids.length+' 人）');
  }catch(err){toast('發送失敗：'+(err.message||err));}
}

const subOpen={};
function toggleSubRows(rid){const cv=document.getElementById('cv-'+rid);const rows=document.querySelectorAll(`tr.detrow[data-grp="${rid}"]`);if(!rows.length)return;const show=rows[0].style.display==='none';rows.forEach(r=>r.style.display=show?'':'none');if(cv)cv.classList.toggle('open',show);}
function aggChannel(courses,ch){const pk=ch+'Pay',map={};courses.forEach(c=>{const b=c.billing;if(!b[ch])return;uniqInstrs(c).filter(n=>!isInternal(n)).forEach(n=>{const p=(b[pk]||{})[n];if(!p)return;const fee=num(p.fee),tr=num(p.transport);if(!fee&&!tr)return;const r=map[n]||(map[n]={fee:0,transport:0,items:[]});r.fee+=fee;r.transport+=tr;r.items.push({date:c.date,name:c.name,fee,transport:tr});});});return map;}
function aggLabor(courses){const ext={},int={};courses.forEach(c=>{const b=c.billing;if(!b.labor)return;uniqInstrs(c).forEach(n=>{const amt=num((b.laborPay||{})[n]);if(!amt)return;if(isInternal(n)){const r=int[n]||(int[n]={amt:0,items:[]});r.amt+=amt;r.items.push({date:c.date,name:c.name,amt});}else{const r=ext[n]||(ext[n]={amt:0,items:[]});r.amt+=amt;r.items.push({date:c.date,name:c.name,amt});}});});return{ext,int};}

function salaryByInstr(month,inc){
  const courses=S.courses.filter(c=>(!month||ym(c.date)===month)&&(inc||!c.archived));
  const company=aggChannel(courses,'company'),assoc=aggChannel(courses,'assoc'),labor=aggLabor(courses);
  const names=[...new Set([...Object.keys(company),...Object.keys(assoc),...Object.keys(labor.ext)])];
  const out={};
  names.forEach(n=>{out[n]={company:company[n]||null,assoc:assoc[n]||null,labor:labor.ext[n]||null};});
  return out;
}
function buildSalaryMessage(name,d,month){
  const L=['請確認一下 '+month.slice(0,4)+'/'+month.slice(4)+' 的費用'];
  if(d.company){L.push('公司');d.company.items.forEach(it=>L.push(fmtDate(it.date)+'　'+it.name+'  $'+fmt(it.fee+it.transport)));L.push('共 $'+fmt(d.company.fee+d.company.transport));}
  if(d.assoc){L.push('協會');d.assoc.items.forEach(it=>L.push(fmtDate(it.date)+'　'+it.name+'  $'+fmt(it.fee+it.transport)));L.push('共 $'+fmt(d.assoc.fee+d.assoc.transport));}
  if(d.labor){L.push('已經簽署勞報的課程，將由該單位直接支付');d.labor.items.forEach(it=>L.push(fmtDate(it.date)+'　'+it.name+'  $'+fmt(it.amt)));}
  L.push('','如有問題，可以向翔文詢問，謝謝');
  return L.join('\n');
}
async function sendSalaryNotice(){
  const month=$('#sMonth').value;
  if(!month){alert('請先在上方選擇要通知的月份。');return;}
  const inc=$('#sArch').checked;
  const data=salaryByInstr(month,inc),names=Object.keys(data);
  const label=month.slice(0,4)+'/'+month.slice(4);
  if(!names.length){alert(label+' 沒有任何外部講師費用可通知。');return;}
  const sendable=[],noId=[];
  names.forEach(n=>{const o=instrByName(n),msg=buildSalaryMessage(n,data[n],month);if(o&&o.userId)sendable.push({name:n,userId:o.userId,msg});else noId.push({name:n,msg});});
  const endpoint=(S.settings&&S.settings.lineEndpoint)||'';
  if(!endpoint){
    const preview=names.map(n=>'── '+n+((instrByName(n)&&instrByName(n).userId)?'':'（無 userId）')+' ──\n'+buildSalaryMessage(n,data[n],month)).join('\n\n');
    alert('尚未設定發送端點（⚙ 設定 → 通知設定）。\n\n— 預覽（每位外部講師一則）—\n\n'+preview);
    return;
  }
  if(!sendable.length){alert('有費用的外部講師都沒有 LINE userId，無法發送：\n'+noId.map(x=>x.name).join('、'));return;}
  if(!confirm('將分別發送 '+label+' 薪資通知給：\n'+sendable.map(x=>x.name).join('、')+'（共 '+sendable.length+' 位）'+(noId.length?'\n略過無 userId：'+noId.map(x=>x.name).join('、'):'')+'\n\n確定發送？'))return;
  let ok=0;
  for(const s of sendable){try{await fetch(endpoint,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({to:[s.userId],message:s.msg})});ok++;}catch(e){}}
  toast('已送出薪資通知（'+ok+' 位外部講師）');
}

function renderSalary(){
  const month=$('#sMonth').value,inc=$('#sArch').checked;
  const courses=S.courses.filter(c=>(!month||ym(c.date)===month)&&(inc||!c.archived));
  const company=aggChannel(courses,'company'),assoc=aggChannel(courses,'assoc'),labor=aggLabor(courses);
  const sum=m=>Object.values(m).reduce((s,r)=>s+r.fee+r.transport,0);
  const compTot=sum(company),assocTot=sum(assoc);
  const laborExt=Object.values(labor.ext).reduce((s,r)=>s+r.amt,0);
  const laborInt=Object.values(labor.int).reduce((s,r)=>s+r.amt,0);
  $('#salarySummary').innerHTML=`
    <div class="stat green"><div class="lab">公司應付（薪資＋交通）</div><div class="val">$${fmt(compTot)}</div></div>
    <div class="stat blue"><div class="lab">協會應付（薪資＋交通）</div><div class="val">$${fmt(assocTot)}</div></div>
    <div class="stat"><div class="lab">勞報・外部薪資</div><div class="val">$${fmt(laborExt)}</div></div>
    <div class="stat"><div class="lab">內部講師月薪扣回</div><div class="val">$${fmt(laborInt)}</div></div>`;
  $('#salaryBlocks').innerHTML=channelBlock('公司發票請款',company,'co','')+channelBlock('協會收據請款',assoc,'as','assoc')+laborBlock(labor);
}
function channelBlock(title,map,key,cls){
  const names=Object.keys(map);
  let rows='';
  names.forEach((n,i)=>{const r=map[n],rid=key+i;
    rows+=`<tr class="srow" onclick="toggleSubRows('${rid}')"><td><span class="chev2" id="cv-${rid}">▶</span> ${esc(n)} <span class="typebadge out">外部</span></td><td class="r">$${fmt(r.fee)}</td><td class="r">$${fmt(r.transport)}</td><td class="r"><b>$${fmt(r.fee+r.transport)}</b></td></tr>`;
    r.items.forEach(it=>{rows+=`<tr class="detrow" data-grp="${rid}" style="display:none"><td class="det">↳ ${fmtDate(it.date)}　${esc(it.name)}</td><td class="r muted">$${fmt(it.fee)}</td><td class="r muted">$${fmt(it.transport)}</td><td></td></tr>`;});
  });
  const tf=names.reduce((s,n)=>s+map[n].fee,0),tt=names.reduce((s,n)=>s+map[n].transport,0);
  const body=names.length?`<table class="sal"><thead><tr><th>指導員</th><th class="r">薪資</th><th class="r">交通費</th><th class="r">合計</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td>合計</td><td class="r">$${fmt(tf)}</td><td class="r">$${fmt(tt)}</td><td class="r">$${fmt(tf+tt)}</td></tr></tfoot></table>`:`<div class="empty-hint" style="padding:14px">本月此管道無外部講師費用。</div>`;
  return `<div class="sblock ${cls}"><h3>${title}</h3>${body}</div>`;
}
function laborBlock(lab){
  const ext=Object.keys(lab.ext),int=Object.keys(lab.int);
  let rows='';
  ext.forEach((n,i)=>{const r=lab.ext[n],rid='le'+i;
    rows+=`<tr class="srow" onclick="toggleSubRows('${rid}')"><td><span class="chev2" id="cv-${rid}">▶</span> ${esc(n)} <span class="typebadge out">外部</span></td><td class="r">$${fmt(r.amt)}</td><td class="r">—</td><td class="r"><b>$${fmt(r.amt)}</b></td></tr>`;
    r.items.forEach(it=>{rows+=`<tr class="detrow" data-grp="${rid}" style="display:none"><td class="det">↳ ${fmtDate(it.date)}　${esc(it.name)}</td><td class="r muted">$${fmt(it.amt)}</td><td></td><td></td></tr>`;});
  });
  int.forEach((n,i)=>{const r=lab.int[n],rid='li'+i;
    rows+=`<tr class="srow" onclick="toggleSubRows('${rid}')"><td><span class="chev2" id="cv-${rid}">▶</span> ${esc(n)} <span class="typebadge in">內部</span></td><td class="r">—</td><td class="r">-$${fmt(r.amt)}</td><td class="r"><b>-$${fmt(r.amt)}</b></td></tr>`;
    r.items.forEach(it=>{rows+=`<tr class="detrow" data-grp="${rid}" style="display:none"><td class="det">↳ ${fmtDate(it.date)}　${esc(it.name)}</td><td></td><td class="r muted">-$${fmt(it.amt)}</td><td></td></tr>`;});
  });
  const te=ext.reduce((s,n)=>s+lab.ext[n].amt,0),ti=int.reduce((s,n)=>s+lab.int[n].amt,0);
  const body=(ext.length||int.length)?`<table class="sal"><thead><tr><th>指導員</th><th class="r">薪資</th><th class="r">扣回</th><th class="r">小計</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td>合計</td><td class="r">$${fmt(te)}</td><td class="r">${ti?'-$'+fmt(ti):'$0'}</td><td class="r">$${fmt(te-ti)}</td></tr></tfoot></table>`:`<div class="empty-hint" style="padding:14px">本月無勞報。</div>`;
  return `<div class="sblock labor"><h3>勞報請款</h3>${body}</div>`;
}
